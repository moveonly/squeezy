name: Setup semantic graph benchmark
description: Show toolchains, install language prerequisites, and cache Cargo.

inputs:
  language:
    description: Benchmark language family.
    required: true
  typescript-version:
    description: TypeScript package version for the JS/TS oracle.
    required: false
    default: "6.0.3"

runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.language == 'python'
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"

    - name: Set up Go
      if: inputs.language == 'go'
      uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
      with:
        go-version: "1.22"
        cache: false

    - name: Set up .NET
      if: inputs.language == 'csharp'
      uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Set up JDK 17 for Kotlin oracle
      if: inputs.language == 'kotlin'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install Kotlin compiler
      if: inputs.language == 'kotlin'
      shell: bash
      run: |
        # Kotlin oracle (`benchmarks/oracle/kotlin/KotlinOracle.kt`) depends
        # on PSI types shipped with kotlin-compiler-embeddable, bundled with
        # the standalone kotlinc distribution. Pin in lockstep with the
        # tree-sitter-kotlin-ng grammar release tracked in Cargo.toml.
        KOTLIN_VERSION="1.9.24"
        curl -sLo /tmp/kotlin.zip \
          "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip"
        sudo unzip -q /tmp/kotlin.zip -d /opt
        echo "/opt/kotlinc/bin" >> "$GITHUB_PATH"

    - name: Install C/C++ validation tools
      if: inputs.language == 'c-family'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y clang
        clang --version
        clang++ --version

    - name: Set up JDK 17 for Scala
      if: inputs.language == 'scala'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Install Coursier + Scala 3 toolchain
      if: inputs.language == 'scala'
      shell: bash
      run: |
        curl -fL https://github.com/coursier/launchers/raw/master/cs-x86_64-pc-linux.gz \
          | gunzip > cs
        chmod +x cs
        sudo mv cs /usr/local/bin/cs
        cs setup --yes
        cs install --quiet scala3-compiler scala-cli
        echo "$HOME/.local/share/coursier/bin" >> "$GITHUB_PATH"

    - name: Ensure rust-analyzer when available
      if: inputs.language == 'rust'
      shell: bash
      run: rustup component add rust-analyzer || true

    - name: Show toolchains
      shell: bash
      run: |
        rustup show
        rustc --version
        cargo --version
        case "${{ inputs.language }}" in
          c-family)
            clang --version
            clang++ --version
            ;;
          csharp)
            dotnet --info
            ;;
          go)
            go version
            ;;
          java)
            java -version
            ;;
          kotlin)
            java -version
            kotlinc -version
            ;;
          js-ts)
            node --version
            npm --version
            ;;
          python)
            python --version
            ;;
          scala)
            java -version
            scalac -version || true
            scala-cli --version || true
            ;;
        esac

    - name: Install TypeScript oracle
      if: inputs.language == 'js-ts'
      shell: bash
      run: npm install --prefix target/js-ts-oracle "typescript@${{ inputs.typescript-version }}"

    - name: Cache Cargo
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
