name: Reusable Semantic Graph Benchmark

on:
  workflow_call:
    inputs:
      language:
        description: Benchmark language family.
        required: true
        type: string
      tier:
        description: Benchmark tier.
        required: true
        type: string
      artifact-suffix:
        description: Artifact suffix.
        required: true
        type: string
      summary-file:
        description: Summary markdown file name.
        required: true
        type: string
      typescript-version:
        description: TypeScript package version for JS/TS oracle.
        required: false
        type: string
        default: "6.0.3"
  workflow_dispatch:
    inputs:
      language:
        description: Benchmark language family.
        required: true
        default: "rust"
        type: choice
        options:
          - rust
          - python
          - java
          - go
          - c-family
          - csharp
          - js-ts
          - ruby
      tier:
        description: Benchmark tier.
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SQUEEZY_TYPESCRIPT_VERSION: ${{ inputs.typescript-version || '6.0.3' }}
  SQUEEZY_TYPESCRIPT_PATH: ${{ github.workspace }}/target/js-ts-oracle/node_modules/typescript

jobs:
  benchmark:
    name: ${{ inputs.language }} benchmark
    runs-on: ${{ inputs.language == 'rust' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: ${{ (inputs.language == 'c-family' || inputs.language == 'csharp') && 90 || inputs.language == 'go' && 60 || inputs.language == 'ruby' && 45 || 120 }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup benchmark
        uses: ./.github/actions/setup-bench
        with:
          language: ${{ inputs.language }}
          typescript-version: ${{ env.SQUEEZY_TYPESCRIPT_VERSION }}

      - name: Setup Ruby 3.3 (Prism oracle)
        if: inputs.language == 'ruby'
        continue-on-error: true
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Verify Prism availability
        if: inputs.language == 'ruby'
        continue-on-error: true
        run: ruby -rprism -e 'puts Prism::VERSION'

      - name: Pre-build Roslyn C# oracle
        if: inputs.language == 'csharp'
        run: |
          dotnet build benchmarks/oracle/csharp/CsharpOracle.csproj \
            -c Release --nologo -v minimal

      - name: Run semantic graph benchmark corpus
        run: |
          cargo run --release --manifest-path benchmarks/squeezy-graph-bench/Cargo.toml -- \
            --corpus benchmarks/corpus.json \
            --family "${{ inputs.language }}" \
            --tier "${{ inputs.tier }}" \
            --report-dir target/semantic-graph-benchmark

      - name: Write benchmark summary
        run: |
          python3 benchmarks/scripts/summarize.py \
            --language "${{ inputs.language }}" \
            --report-glob "target/semantic-graph-benchmark/**/*.json" \
            --output "${{ inputs.summary-file || format('__{0}_summary.md', inputs.language) }}"
          cat "${{ inputs.summary-file || format('__{0}_summary.md', inputs.language) }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semantic-graph-benchmark-${{ inputs.artifact-suffix || inputs.language }}-${{ inputs.tier || 'smoke' }}
          path: |
            target/semantic-graph-benchmark/**/*.json
            ${{ inputs.summary-file || format('__{0}_summary.md', inputs.language) }}
          if-no-files-found: error
