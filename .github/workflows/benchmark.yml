      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: csharp
      summary-file: __csharp_summary.md

  js-ts-semantic-graph-smoke:
    name: JS/TS semantic graph smoke
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'js-ts' || inputs.language == 'all'))
        || github.event_name == 'push'
        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs['js-ts'] == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: js-ts
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: js-ts
      summary-file: __js_ts_summary.md

  # New language: Kotlin oracle/gates have not yet held two weeks of CI.
  # The job uses the same reusable workflow as the other languages and
  # follows the rest of the smoke-tier pattern; remove this comment once
  # the Kotlin gate has been steady for two weeks of CI per the
  # repo's convention for newly-added languages.
  kotlin-semantic-graph-smoke:
    name: Kotlin semantic graph smoke
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'kotlin' || inputs.language == 'all'))
