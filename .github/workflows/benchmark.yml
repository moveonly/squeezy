name: Semantic Graph Benchmark

on:
  push:
    branches:
      - main
      - "benchmark-full/**"
    paths:
      - ".github/actions/setup-bench/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-lang.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      language:
        description: "Benchmark language family"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - rust
          - python
          - java
          - go
          - c-family
          - csharp
          - js-ts
          - kotlin
          - swift
          - ruby
          - php
          - scala
          - dart
      tier:
        description: "Benchmark tier"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

# On main, a new push supersedes the previous run.
# On PRs, re-labeling cancels the previous label-triggered run for that PR.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  language-docs:
    name: Language coverage docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check language coverage docs
        run: python3 benchmarks/scripts/check_languages_doc.py

  rust-semantic-graph:
    name: Rust semantic graph
    if: >-
      !cancelled()
      && (github.event_name == 'push'
        || (github.event_name == 'pull_request' && github.event.label.name == 'benchmark')
        || (github.event_name == 'workflow_dispatch' && (inputs.language == 'rust' || inputs.language == 'all')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: rust
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: rust
      summary-file: __rust_summary.md

  python-semantic-graph-smoke:
    name: Python semantic graph smoke
    if: >-
      !cancelled()
      && (github.event_name == 'push'
        || (github.event_name == 'pull_request' && github.event.label.name == 'benchmark')
        || (github.event_name == 'workflow_dispatch' && (inputs.language == 'python' || inputs.language == 'all')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: python
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: python
      summary-file: __python_summary.md

  java-semantic-graph-smoke:
