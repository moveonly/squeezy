    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'c-family' || inputs.language == 'all'))
        || github.event_name == 'push'
        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs['c-family'] == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: c-family
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
