name: Semantic Graph Benchmark

on:
  pull_request:
    paths:
      - ".github/actions/setup-bench/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-lang.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "benchmark-full/**"
    paths:
      - ".github/actions/setup-bench/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-lang.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      language:
        description: "Benchmark language family"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - rust
          - python
          - java
          - go
          - c-family
          - csharp
          - js-ts
      tier:
        description: "Benchmark tier"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

jobs:
  language-docs:
    name: Language coverage docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check language coverage docs
        run: python3 benchmarks/scripts/check_languages_doc.py

  rust-semantic-graph:
    name: Rust semantic graph
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'rust' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: rust
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: rust
      summary-file: __rust_summary.md

  python-semantic-graph-smoke:
    name: Python semantic graph smoke
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'python' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: python
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: python
      summary-file: __python_summary.md

  java-semantic-graph-smoke:
    name: Java semantic graph smoke
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'java' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: java
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: java
      summary-file: __java_summary.md

  go-semantic-graph-smoke:
    name: Go semantic graph
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'go' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: go
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: go
      summary-file: __go_summary.md

  c-family-semantic-graph:
    name: C/C++ semantic graph
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'c-family' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: c-family
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: c-family
      summary-file: __c_family_summary.md

  csharp-semantic-graph:
    name: C# semantic graph
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'csharp' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: csharp
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: csharp
      summary-file: __csharp_summary.md

  js-ts-semantic-graph-smoke:
    name: JS/TS semantic graph smoke
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'js-ts' || inputs.language == 'all' }}
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: js-ts
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: js-ts
      summary-file: __js_ts_summary.md
