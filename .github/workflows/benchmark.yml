      summary-file: __c_family_summary.md

  csharp-semantic-graph:
    name: C# semantic graph
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'csharp' || inputs.language == 'all'))
