name: Semantic Graph Benchmark

on:
  pull_request:
    paths:
      - ".github/actions/setup-bench/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-lang.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
      - "benchmark-full/**"
    paths:
      - ".github/actions/setup-bench/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-lang.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      language:
        description: "Benchmark language family"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - rust
          - python
          - java
          - go
          - c-family
          - csharp
          - js-ts
          - kotlin
          - swift
          - ruby
          - php
          - scala
          - dart
      tier:
        description: "Benchmark tier"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

jobs:
  language-docs:
    name: Language coverage docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check language coverage docs
        run: python3 benchmarks/scripts/check_languages_doc.py

  changes:
    name: Detect changed language paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      go: ${{ steps.filter.outputs.go }}
      c-family: ${{ steps.filter.outputs['c-family'] }}
      csharp: ${{ steps.filter.outputs.csharp }}
      js-ts: ${{ steps.filter.outputs['js-ts'] }}
      kotlin: ${{ steps.filter.outputs.kotlin }}
      swift: ${{ steps.filter.outputs.swift }}
      ruby: ${{ steps.filter.outputs.ruby }}
      php: ${{ steps.filter.outputs.php }}
      scala: ${{ steps.filter.outputs.scala }}
      dart: ${{ steps.filter.outputs.dart }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            shared:
              - ".github/actions/setup-bench/**"
              - ".github/workflows/benchmark.yml"
              - ".github/workflows/benchmark-lang.yml"
              - "benchmarks/corpus.json"
              - "benchmarks/scripts/**"
              - "benchmarks/squeezy-graph-bench/**"
              - "benchmarks/specs/empty-queries.json"
              - "crates/squeezy-core/**"
              - "crates/squeezy-workspace/**"
              - "crates/squeezy-graph/Cargo.toml"
              - "crates/squeezy-graph/src/lib.rs"
              - "crates/squeezy-graph/src/cross_file/**"
              - "crates/squeezy-parse/Cargo.toml"
              - "crates/squeezy-parse/src/lib.rs"
              - "Cargo.toml"
              - "Cargo.lock"
            rust:
              - "crates/squeezy-graph/src/languages/rust*.rs"
              - "crates/squeezy-parse/src/languages/rust*.rs"
              - "benchmarks/fixtures/rust/**"
              - "benchmarks/specs/smoke-queries.json"
            python:
              - "crates/squeezy-graph/src/languages/python*.rs"
              - "crates/squeezy-parse/src/languages/python*.rs"
              - "benchmarks/fixtures/python/**"
              - "benchmarks/specs/python-*.json"
            java:
              - "crates/squeezy-graph/src/languages/java*.rs"
              - "crates/squeezy-parse/src/languages/java*.rs"
              - "benchmarks/fixtures/java/**"
              - "benchmarks/specs/java-*.json"
            go:
              - "crates/squeezy-graph/src/languages/go*.rs"
              - "crates/squeezy-parse/src/languages/go*.rs"
              - "benchmarks/fixtures/go/**"
              - "benchmarks/specs/go-*.json"
            c-family:
              - "crates/squeezy-graph/src/languages/c_family*.rs"
              - "crates/squeezy-parse/src/languages/c_family*.rs"
              - "benchmarks/fixtures/c/**"
              - "benchmarks/fixtures/cpp/**"
              - "benchmarks/specs/c-*.json"
              - "benchmarks/specs/cpp-*.json"
            csharp:
              - "crates/squeezy-graph/src/languages/csharp*.rs"
              - "crates/squeezy-parse/src/languages/csharp*.rs"
              - "benchmarks/fixtures/csharp/**"
              - "benchmarks/specs/csharp-*.json"
              - "benchmarks/oracle/csharp/**"
            js-ts:
              - "crates/squeezy-graph/src/languages/js_ts*.rs"
              - "crates/squeezy-parse/src/languages/js_ts*.rs"
              - "benchmarks/fixtures/js-ts/**"
              - "benchmarks/specs/js-ts-*.json"
            kotlin:
              - "crates/squeezy-graph/src/languages/kotlin*.rs"
              - "crates/squeezy-parse/src/languages/kotlin*.rs"
              - "benchmarks/fixtures/kotlin/**"
              - "benchmarks/specs/kotlin-*.json"
              - "benchmarks/oracle/kotlin/**"
            swift:
              - "crates/squeezy-graph/src/languages/swift*.rs"
              - "crates/squeezy-parse/src/languages/swift*.rs"
              - "benchmarks/fixtures/swift/**"
              - "benchmarks/specs/swift-*.json"
              - "benchmarks/baselines/swift.json"
              - "benchmarks/heuristic-history/swift.jsonl"
            ruby:
              - "crates/squeezy-graph/src/languages/ruby*.rs"
              - "crates/squeezy-parse/src/languages/ruby*.rs"
              - "benchmarks/fixtures/ruby/**"
              - "benchmarks/specs/ruby-*.json"
              - "benchmarks/baselines/ruby.json"
              - "benchmarks/heuristic-history/ruby.jsonl"
            php:
              - "crates/squeezy-graph/src/languages/php*.rs"
              - "crates/squeezy-parse/src/languages/php*.rs"
              - "benchmarks/fixtures/php/**"
              - "benchmarks/specs/php-*.json"
              - "benchmarks/oracle-helpers/php-oracle/**"
            scala:
              - "crates/squeezy-graph/src/languages/scala*.rs"
              - "crates/squeezy-parse/src/languages/scala*.rs"
              - "benchmarks/fixtures/scala/**"
              - "benchmarks/specs/scala-*.json"
              - "benchmarks/oracle/scala/**"
              - "benchmarks/baselines/scala.json"
              - "benchmarks/heuristic-history/scala.jsonl"
            dart:
              - "crates/squeezy-graph/src/languages/dart*.rs"
              - "crates/squeezy-parse/src/languages/dart*.rs"
              - "benchmarks/fixtures/dart/**"
              - "benchmarks/specs/dart-*.json"
              - "benchmarks/oracle-helpers/dart-oracle/**"
              - "benchmarks/baselines/dart.json"
              - "benchmarks/heuristic-history/dart.jsonl"

  rust-semantic-graph:
    name: Rust semantic graph
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'rust' || inputs.language == 'all'))
        || github.event_name == 'push'
        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.rust == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: rust
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || startsWith(github.ref, 'refs/heads/benchmark-full/') && 'full' || 'smoke' }}
      artifact-suffix: rust
      summary-file: __rust_summary.md

  python-semantic-graph-smoke:
    name: Python semantic graph smoke
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'python' || inputs.language == 'all'))
        || github.event_name == 'push'
        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.python == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: python
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: python
      summary-file: __python_summary.md

  java-semantic-graph-smoke:
    name: Java semantic graph smoke
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'java' || inputs.language == 'all'))
