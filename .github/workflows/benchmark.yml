        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.kotlin == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: kotlin
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
      artifact-suffix: kotlin
      summary-file: __kotlin_summary.md

  swift-semantic-graph-smoke:
    name: Swift semantic graph smoke
    needs: changes
    if: >-
      !cancelled()
      && ((github.event_name == 'workflow_dispatch' && (inputs.language == 'swift' || inputs.language == 'all'))
        || github.event_name == 'push'
        || (github.event_name == 'pull_request' && (needs.changes.outputs.shared == 'true' || needs.changes.outputs.swift == 'true')))
    uses: ./.github/workflows/benchmark-lang.yml
    with:
      language: swift
      tier: ${{ github.event_name == 'workflow_dispatch' && inputs.tier || 'smoke' }}
