name: CI

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Branch, tag, SHA, or pull request ref to build. Defaults to the selected ref.
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@091bd13faf7e96935df105635d17ce9a607bc99d # v2
        with:
          rust-version: "1.93.1"
          command: check
          arguments: --all-features

  build-test-lint-coverage:
    name: Validate and debug artifact (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact-name: squeezy-debug-macos
            binary-path: target/debug/squeezy
          - platform: linux
            os: ubuntu-22.04
            artifact-name: squeezy-debug-linux-x86_64-musl
            binary-path: target/x86_64-unknown-linux-musl/debug/squeezy

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Ensure Rust components
        run: rustup component add rustfmt clippy

      - name: Install Linux musl tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file binutils
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install CI tools
        if: matrix.platform == 'macos'
        run: brew install actionlint typos-cli

      - name: Check secrets
        if: matrix.platform == 'macos'
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Check workflows
        if: matrix.platform == 'macos'
        run: actionlint

      - name: Check docs text
        if: matrix.platform == 'macos'
        run: typos README.md CONTRIBUTING.md docs .github

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check unit test layout
        run: python3 scripts/check_test_layout.py

      - name: Lint Rust
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo clippy --workspace --all-targets --target x86_64-unknown-linux-musl -- -D warnings
          else
            cargo clippy --workspace --all-targets -- -D warnings
          fi

      - name: Test Rust
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo test --workspace --all-targets --target x86_64-unknown-linux-musl
          else
            cargo test --workspace --all-targets
          fi

      - name: Run deterministic validation harness
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo run -p squeezy-harness --target x86_64-unknown-linux-musl -- run \
              --runner mock-openai \
              --runner mock-anthropic \
              --runner grep-baseline \
              --jsonl "target/harness-${{ matrix.platform }}.jsonl"
          else
            cargo run -p squeezy-harness -- run \
              --runner mock-openai \
              --runner mock-anthropic \
              --runner grep-baseline \
              --jsonl "target/harness-${{ matrix.platform }}.jsonl"
          fi

      - name: Build debug artifact
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo build -p squeezy-cli --target x86_64-unknown-linux-musl
          else
            cargo build -p squeezy-cli
          fi

      - name: Smoke-test debug artifact
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            file "$binary"
            if readelf -l "$binary" | grep -q INTERP; then
              echo "Linux debug binary has a dynamic program interpreter" >&2
              exit 1
            fi

            if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
              echo "Linux debug binary has dynamic library dependencies" >&2
              exit 1
            fi
          fi

          "$binary" --health
          "$binary" --version
          "$binary" --help >/dev/null

      - name: Package debug artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}"
          chmod +x "dist/${{ matrix.artifact-name }}"

      - name: Upload debug artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error
          retention-days: 7

  coverage-summary:
    name: Coverage summary (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs:
      - dependency-policy
      - build-test-lint-coverage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Ensure coverage component
        run: rustup component add llvm-tools-preview

      - name: Install Linux coverage tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cace7d8762492808237e791b718365fe6f57c8b2 # cargo-llvm-cov

      - name: Test with coverage
        shell: bash
        run: |
          set -o pipefail
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo llvm-cov --workspace --all-targets --target x86_64-unknown-linux-musl --summary-only | tee coverage-summary.txt
          else
            cargo llvm-cov --workspace --all-targets --summary-only | tee coverage-summary.txt
          fi
          {
            echo "## Coverage Summary (${{ matrix.platform }})"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  release-binaries:
    name: Release artifact (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs:
      - dependency-policy
      - build-test-lint-coverage
      - coverage-summary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact-name: squeezy-macos
            binary-path: target/release/squeezy
          - platform: linux
            os: ubuntu-22.04
            artifact-name: squeezy-linux-x86_64-musl
            binary-path: target/x86_64-unknown-linux-musl/release/squeezy

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Install Linux release tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file binutils
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release artifact
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo build --release -p squeezy-cli --target x86_64-unknown-linux-musl
          else
            cargo build --release -p squeezy-cli
          fi

      - name: Smoke-test release artifact
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            file "$binary"
            if readelf -l "$binary" | grep -q INTERP; then
              echo "Linux release binary has a dynamic program interpreter" >&2
              exit 1
            fi

            if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
              echo "Linux release binary has dynamic library dependencies" >&2
              exit 1
            fi
          fi

          "$binary" --health
          "$binary" --version
          "$binary" --help >/dev/null

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}"
          chmod +x "dist/${{ matrix.artifact-name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error
