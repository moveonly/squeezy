name: CI

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Branch, tag, SHA, or pull request ref to build. Defaults to the selected ref.
        required: false
        type: string
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Cancel any in-flight run for the same ref when a newer commit arrives.
# This keeps the free GitHub Actions queue short: stale runs on superseded
# commits are wasteful and block capacity for the run that actually matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SQUEEZY_TELEMETRY: off

jobs:
  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: "1.96.0"
          command: check
          arguments: --all-features

  dead-deps:
    name: Dead dependency scan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-shear
        uses: taiki-e/install-action@cace7d8762492808237e791b718365fe6f57c8b2 # cargo-shear
        with:
          tool: cargo-shear

      - name: Run cargo-shear
        run: cargo shear

  build-script-allowlist:
    name: Build-script allowlist
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false

      - name: Self-test build-script scanner
        run: python3 scripts/check_build_scripts.py --self-test

      - name: Enforce build-script allowlist
        run: python3 scripts/check_build_scripts.py

  build-test-lint-coverage:
    name: Validate and debug artifact (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact-name: squeezy-debug-macos
            binary-path: target/debug/squeezy
          - platform: linux
            os: ubuntu-22.04
            artifact-name: squeezy-debug-linux-x86_64-musl
            binary-path: target/x86_64-unknown-linux-musl/debug/squeezy
          - platform: windows
            os: windows-2022
            artifact-name: squeezy-debug-windows-x86_64
            binary-path: target/debug/squeezy.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Ensure Rust components
        run: rustup component add rustfmt clippy

      - name: Install Linux musl tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file binutils
          rustup target add x86_64-unknown-linux-musl

      - name: Install Windows binary inspection tools
        if: matrix.platform == 'windows'
        run: rustup component add llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ matrix.platform != 'windows' }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cace7d8762492808237e791b718365fe6f57c8b2 # nextest
        with:
          tool: cargo-nextest

      - name: Install CI tools
        if: matrix.platform == 'macos'
        run: brew install actionlint typos-cli

      - name: Check secrets
        if: matrix.platform == 'macos'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Check workflows
        if: matrix.platform == 'macos'
        run: actionlint

      - name: Check docs text
        if: matrix.platform == 'macos'
        run: typos README.md CONTRIBUTING.md docs .github

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check unit test layout
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            python scripts/check_test_layout.py
          else
            python3 scripts/check_test_layout.py
          fi

      - name: Test Rust
        shell: bash
        run: |
          # Deepest async agent/harness tests overflow the default ~2 MiB
          # libtest thread stack on every platform; nextest forwards this env
          # to each test process.
          export RUST_MIN_STACK=16777216
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            scripts/test_clean_env.sh --workspace --all-targets --profile ci --target x86_64-unknown-linux-musl
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            SQUEEZY_SHELL=gitbash scripts/test_clean_env.sh --workspace --all-targets --profile ci
          else
            scripts/test_clean_env.sh --workspace --all-targets --profile ci
          fi

      - name: Lint Rust
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo clippy --workspace --all-targets --no-deps --target x86_64-unknown-linux-musl -- -D warnings
          else
            cargo clippy --workspace --all-targets --no-deps -- -D warnings
          fi

      - name: Run deterministic validation harness
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo run -p squeezy-harness --target x86_64-unknown-linux-musl -- run \
              --runner mock-openai \
              --runner mock-anthropic \
              --runner grep-baseline \
              --jsonl "target/harness-${{ matrix.platform }}.jsonl"
          else
            cargo run -p squeezy-harness -- run \
              --runner mock-openai \
              --runner mock-anthropic \
              --runner grep-baseline \
              --jsonl "target/harness-${{ matrix.platform }}.jsonl"
          fi

      - name: Build debug artifact
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            if [[ -d target/x86_64-unknown-linux-musl/debug/deps ]]; then
              find target/x86_64-unknown-linux-musl/debug/deps \
                -maxdepth 1 -type f -perm -111 -delete
            fi
            rm -rf target/x86_64-unknown-linux-musl/debug/incremental target/nextest
            df -h .
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo build -p squeezy --target x86_64-unknown-linux-musl
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
            cargo build -p squeezy
          else
            cargo build -p squeezy
          fi

      - name: Smoke-test debug artifact
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            file "$binary"
            if readelf -l "$binary" | grep -q INTERP; then
              echo "Linux debug binary has a dynamic program interpreter" >&2
              exit 1
            fi

            if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
              echo "Linux debug binary has dynamic library dependencies" >&2
              exit 1
            fi
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            objdump="$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | sed -n 's/^host: //p')/bin/llvm-objdump.exe"
            if command -v cygpath >/dev/null 2>&1; then
              objdump="$(cygpath -u "$objdump")"
            fi
            "$objdump" -p "$binary" | tee windows-imports.txt
            if grep -Eiq 'DLL Name: (vcruntime|msvcp|concrt|ucrtbase|api-ms-win-crt)' windows-imports.txt; then
              echo "Windows debug binary imports C/C++ runtime DLLs; build with static CRT" >&2
              exit 1
            fi
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            otool -L "$binary" | tee macos-dylibs.txt
            while IFS= read -r dylib; do
              case "$dylib" in
                /usr/lib/*|/System/Library/*) ;;
                *)
                  echo "macOS debug binary depends on a non-system dylib: $dylib" >&2
                  exit 1
                  ;;
              esac
            done < <(awk 'NR > 1 { print $1 }' macos-dylibs.txt)
          fi

          "$binary" doctor
          "$binary" --version
          "$binary" --help >/dev/null

      - name: Smoke-test install.sh
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          sh -n install.sh

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            triple="x86_64-unknown-linux-musl"
          else
            triple="$(uname -m | grep -q arm64 && echo aarch64-apple-darwin || echo x86_64-apple-darwin)"
          fi

          mirror="$(mktemp -d)"
          tag="v0.0.0-ci"
          mkdir -p "$mirror/$tag" "$mirror/stage"
          cp "${{ matrix.binary-path }}" "$mirror/stage/squeezy"
          chmod +x "$mirror/stage/squeezy"
          tar -C "$mirror/stage" -czf "$mirror/$tag/squeezy-${triple}.tar.gz" squeezy
          shasum -a 256 "$mirror/$tag/squeezy-${triple}.tar.gz" \
            > "$mirror/$tag/squeezy-${triple}.tar.gz.sha256"

          target="$(mktemp -d)/bin"
          install_log="$(mktemp)"
          SQUEEZY_INSTALL_DIR="$target" \
            SQUEEZY_INSTALL_TAG="$tag" \
            SQUEEZY_INSTALL_BASE_URL="file://$mirror" \
            SQUEEZY_GPG_KEY_PATH="$(mktemp -u)/missing.gpg" \
            sh install.sh >"$install_log" 2>&1
          cat "$install_log"

          test -x "$target/squeezy"
          "$target/squeezy" --version

          if ! grep -q "skipping GPG verify" "$install_log"; then
            echo "install.sh did not warn about missing GPG key" >&2
            exit 1
          fi

          # Negative path: corrupt the checksum and confirm install fails.
          echo "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef  squeezy-${triple}.tar.gz" \
            > "$mirror/$tag/squeezy-${triple}.tar.gz.sha256"
          if SQUEEZY_INSTALL_DIR="$target" \
               SQUEEZY_INSTALL_TAG="$tag" \
               SQUEEZY_INSTALL_BASE_URL="file://$mirror" \
               sh install.sh 2>/dev/null; then
            echo "install.sh accepted a corrupt checksum" >&2
            exit 1
          fi

          # Split-origin variant: serve the .sha256 from a second mirror so a
          # single-origin compromise of the archive host cannot swap both
          # files. Restore a valid checksum on the checksum origin, leave the
          # corrupt one on the archive origin, and confirm the install
          # succeeds (checksum origin wins because it is fetched separately).
          checksum_mirror="$(mktemp -d)"
          mkdir -p "$checksum_mirror/$tag"
          shasum -a 256 "$mirror/$tag/squeezy-${triple}.tar.gz" \
            > "$checksum_mirror/$tag/squeezy-${triple}.tar.gz.sha256"

          split_log="$(mktemp)"
          target2="$(mktemp -d)/bin"
          SQUEEZY_INSTALL_DIR="$target2" \
            SQUEEZY_INSTALL_TAG="$tag" \
            SQUEEZY_INSTALL_BASE_URL="file://$mirror" \
            SQUEEZY_INSTALL_CHECKSUM_BASE_URL="file://$checksum_mirror" \
            SQUEEZY_GPG_KEY_PATH="$(mktemp -u)/missing.gpg" \
            sh install.sh >"$split_log" 2>&1
          cat "$split_log"

          test -x "$target2/squeezy"
          "$target2/squeezy" --version

          if ! grep -q "split from archive origin" "$split_log"; then
            echo "install.sh did not log the split-origin checksum source" >&2
            exit 1
          fi

          # Split-origin negative: corrupt the checksum on the separate origin
          # and confirm install still fails when the second origin disagrees.
          echo "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef  squeezy-${triple}.tar.gz" \
            > "$checksum_mirror/$tag/squeezy-${triple}.tar.gz.sha256"
          if SQUEEZY_INSTALL_DIR="$target2" \
               SQUEEZY_INSTALL_TAG="$tag" \
               SQUEEZY_INSTALL_BASE_URL="file://$mirror" \
               SQUEEZY_INSTALL_CHECKSUM_BASE_URL="file://$checksum_mirror" \
               sh install.sh 2>/dev/null; then
            echo "install.sh accepted a corrupt split-origin checksum" >&2
            exit 1
          fi

      - name: Package debug artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}.exe"
          else
            cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}"
            chmod +x "dist/${{ matrix.artifact-name }}"
          fi

      - name: Upload debug artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}*
          if-no-files-found: error
          retention-days: 7

  xtermcheck-oracle:
    name: xterm.js resize-reflow oracle
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      # The xterm.js (VS Code engine) oracle catches resize-reflow / divider
      # stacking that the byte/cell-level Rust tests cannot see. It is a Node
      # tool, so it is gated here rather than in the cargo nextest run; this job
      # makes it run unconditionally on every PR instead of being manual-only.
      - name: Install xtermcheck deps
        working-directory: crates/squeezy-tui/tools/termsim/xtermcheck
        run: npm ci

      - name: Run xtermcheck regression tests
        working-directory: crates/squeezy-tui/tools/termsim/xtermcheck
        run: npm test

  coverage-summary:
    name: Coverage summary (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs:
      - dependency-policy
      - build-test-lint-coverage
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Free disk space (linux)
        if: matrix.platform == 'linux'
        run: |
          # cargo-llvm-cov instruments the whole workspace and writes a profraw
          # per test process, which can fill the root volume mid-build on the
          # smaller runner images. Drop preinstalled toolchains this job never
          # uses to keep headroom.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h /

      - name: Ensure coverage component
        run: rustup component add llvm-tools-preview

      - name: Install Linux coverage tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@cace7d8762492808237e791b718365fe6f57c8b2 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Test with coverage
        shell: bash
        # MIN_LINE_COVERAGE is a committed floor that turns main red when
        # workspace line coverage craters. It sits below the workspace's
        # current steady-state line coverage on purpose: it must clear on both the
        # macOS and Linux-musl matrix legs without flaking on per-run or
        # per-platform variance, so it gates against material regressions
        # rather than ratcheting to the exact current number. Raise it as
        # coverage rises.
        env:
          MIN_LINE_COVERAGE: "72"
          # Deepest async agent/harness tests overflow the default ~2 MiB
          # libtest thread stack on every platform; nextest forwards this env
          # to each test process.
          RUST_MIN_STACK: "16777216"
        run: |
          set -o pipefail
          status=0
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo llvm-cov nextest --workspace --all-targets --profile ci --target x86_64-unknown-linux-musl --summary-only --fail-under-lines "$MIN_LINE_COVERAGE" | tee coverage-summary.txt || status=$?
          else
            cargo llvm-cov nextest --workspace --all-targets --profile ci --summary-only --fail-under-lines "$MIN_LINE_COVERAGE" | tee coverage-summary.txt || status=$?
          fi
          {
            echo "## Coverage Summary (${{ matrix.platform }})"
            echo
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Surface the report in the step summary even on a threshold/test
          # failure, then propagate the failure (the trailing block above
          # would otherwise mask llvm-cov's non-zero exit).
          exit "$status"

  release-binaries:
    name: Release artifact (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs:
      - dependency-policy
      - build-test-lint-coverage
      - coverage-summary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            artifact-name: squeezy-macos
            binary-path: target/dist/squeezy
          - platform: linux
            os: ubuntu-22.04
            artifact-name: squeezy-linux-x86_64-musl
            binary-path: target/x86_64-unknown-linux-musl/dist/squeezy
          - platform: windows
            os: windows-2022
            artifact-name: squeezy-windows-x86_64
            binary-path: target/dist/squeezy.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.checkout_ref || github.ref }}

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Install Linux release tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file binutils
          rustup target add x86_64-unknown-linux-musl

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release artifact
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
            cargo build --profile dist -p squeezy --target x86_64-unknown-linux-musl
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            export RUSTFLAGS="-C target-feature=+crt-static"
            cargo build --profile dist -p squeezy
          else
            cargo build --profile dist -p squeezy
          fi

      - name: Smoke-test release artifact
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            file "$binary"
            if readelf -l "$binary" | grep -q INTERP; then
              echo "Linux release binary has a dynamic program interpreter" >&2
              exit 1
            fi

            if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
              echo "Linux release binary has dynamic library dependencies" >&2
              exit 1
            fi
          elif [[ "${{ matrix.platform }}" == "windows" ]]; then
            objdump="$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | sed -n 's/^host: //p')/bin/llvm-objdump.exe"
            if command -v cygpath >/dev/null 2>&1; then
              objdump="$(cygpath -u "$objdump")"
            fi
            "$objdump" -p "$binary" | tee windows-imports.txt
            if grep -Eiq 'DLL Name: (vcruntime|msvcp|concrt|ucrtbase|api-ms-win-crt)' windows-imports.txt; then
              echo "Windows release binary imports C/C++ runtime DLLs; build with static CRT" >&2
              exit 1
            fi
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            otool -L "$binary" | tee macos-dylibs.txt
            while IFS= read -r dylib; do
              case "$dylib" in
                /usr/lib/*|/System/Library/*) ;;
                *)
                  echo "macOS release binary depends on a non-system dylib: $dylib" >&2
                  exit 1
                  ;;
              esac
            done < <(awk 'NR > 1 { print $1 }' macos-dylibs.txt)
          fi

          "$binary" doctor
          "$binary" --version
          "$binary" --help >/dev/null

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}.exe"
          else
            cp "${{ matrix.binary-path }}" "dist/${{ matrix.artifact-name }}"
            chmod +x "dist/${{ matrix.artifact-name }}"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}*
          if-no-files-found: error
