name: Java Semantic Graph Benchmark

on:
  pull_request:
    paths:
      - ".github/workflows/java-semantic-graph-benchmark.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/java-semantic-graph-benchmark.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      tier:
        description: "Benchmark tier"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  java-semantic-graph-smoke:
    name: Java semantic graph smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Show toolchains
        run: |
          rustup show
          rustc --version
          cargo --version
          java -version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run Java semantic graph benchmark
        run: |
          cargo run --release --manifest-path benchmarks/squeezy-graph-bench/Cargo.toml -- \
            --language java \
            --fixture benchmarks/fixtures/java/semantic-cases \
            --spec benchmarks/specs/java-smoke-queries.json \
            --report target/semantic-graph-benchmark/java-smoke.json \
            --ra-lsp-probes 0

      - name: Run full external Java comparison
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tier == 'full' }}
        run: |
          mkdir -p target/benchmark-repos target/semantic-graph-benchmark/java-real
          while read -r name url; do
            git clone --depth 1 --filter=blob:none "$url" "target/benchmark-repos/$name"
            cargo run --release --manifest-path benchmarks/squeezy-graph-bench/Cargo.toml -- \
              --language java \
              --fixture "target/benchmark-repos/$name" \
              --spec benchmarks/specs/empty-queries.json \
              --report "target/semantic-graph-benchmark/java-real/$name.json" \
              --ra-lsp-probes 0 \
              --no-speed-gate
          done <<'REPOS'
          junit5 https://github.com/junit-team/junit5
          mockito https://github.com/mockito/mockito
          guava https://github.com/google/guava
          retrofit https://github.com/square/retrofit
          picocli https://github.com/remkop/picocli
          REPOS

      - name: Write benchmark summary
        run: |
          python3 - <<'PY'
          import glob
          import json
          reports = []
          for path in sorted(glob.glob("target/semantic-graph-benchmark/**/*.json", recursive=True)):
              reports.append((path, json.load(open(path))))
          with open("__java_summary.md", "w") as out:
              print("## Java Semantic Graph Benchmark", file=out)
              for path, report in reports:
                  oracle = report["java_oracle"]
                  acc = oracle["symbols"]
                  print("", file=out)
                  print(f"### {path}", file=out)
                  print(f"- Fixture: {report['fixture']}", file=out)
                  print(f"- Validation: {report['validation_status']} in {report['validation_ms']} ms", file=out)
                  print(f"- Squeezy total: {report['squeezy_total_ms']} ms", file=out)
                  print(
                      f"- Java oracle symbols: TP={acc['true_positive']} FP={acc['false_positive']} FN={acc['false_negative']} precision={acc['precision']} recall={acc['recall']}",
                      file=out,
                  )
                  nav = oracle["navigation"]
                  print(
                      f"- Java navigation oracle: queries={nav['query_count']} TP={nav['true_positive']} FP={nav['false_positive']} FN={nav['false_negative']} precision={nav['precision']} recall={nav['recall']}",
                      file=out,
                  )
                  if report["queries"]:
                      print("", file=out)
                      print("| Query | Actual | Missing | Extras |", file=out)
                      print("|---|---:|---:|---:|", file=out)
                      for query in report["queries"]:
                          print(
                              f"| {query['id']} | {len(query['actual'])} | {len(query['missing'])} | {len(query['extras'])} |",
                              file=out,
                          )
          PY
          cat __java_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: java-semantic-graph-benchmark
          path: |
            target/semantic-graph-benchmark/**/*.json
            __java_summary.md
          if-no-files-found: error
