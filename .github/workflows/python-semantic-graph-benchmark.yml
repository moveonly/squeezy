name: Python Semantic Graph Benchmark

on:
  pull_request:
    paths:
      - ".github/workflows/python-semantic-graph-benchmark.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/python-semantic-graph-benchmark.yml"
      - "benchmarks/**"
      - "crates/squeezy-core/**"
      - "crates/squeezy-graph/**"
      - "crates/squeezy-parse/**"
      - "crates/squeezy-workspace/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
    inputs:
      tier:
        description: "Benchmark tier"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  python-semantic-graph-smoke:
    name: Python semantic graph smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run Python semantic graph benchmark
        run: |
          cargo run --release --manifest-path benchmarks/squeezy-graph-bench/Cargo.toml -- \
            --language python \
            --fixture benchmarks/fixtures/python/semantic-cases \
            --spec benchmarks/specs/python-smoke-queries.json \
            --report target/semantic-graph-benchmark/python-smoke.json \
            --ra-lsp-probes 0

      - name: Run full external Python comparison
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tier == 'full' }}
        run: |
          mkdir -p target/benchmark-repos target/semantic-graph-benchmark/python-real
          while read -r name package_root url; do
            git clone --depth 1 --filter=blob:none "$url" "target/benchmark-repos/$name"
            cargo run --release --manifest-path benchmarks/squeezy-graph-bench/Cargo.toml -- \
              --language python \
              --fixture "target/benchmark-repos/$name/$package_root" \
              --spec benchmarks/specs/empty-queries.json \
              --report "target/semantic-graph-benchmark/python-real/$name.json" \
              --ra-lsp-probes 0 \
              --no-speed-gate
          done <<'REPOS'
          requests src/requests https://github.com/psf/requests
          flask src/flask https://github.com/pallets/flask
          click src/click https://github.com/pallets/click
          black src/black https://github.com/psf/black
          fastapi fastapi https://github.com/fastapi/fastapi
          REPOS

      - name: Write benchmark summary
        run: |
          python3 - <<'PY'
          import glob
          import json
          reports = []
          for path in sorted(glob.glob("target/semantic-graph-benchmark/**/*.json", recursive=True)):
              reports.append((path, json.load(open(path))))
          with open("__python_summary.md", "w") as out:
              print("## Python Semantic Graph Benchmark", file=out)
              for path, report in reports:
                  oracle = report["python_oracle"]
                  acc = oracle["symbols"]
                  print("", file=out)
                  print(f"### {path}", file=out)
                  print(f"- Fixture: {report['fixture']}", file=out)
                  print(f"- Validation: {report['validation_status']} in {report['validation_ms']} ms", file=out)
                  print(f"- Squeezy total: {report['squeezy_total_ms']} ms", file=out)
                  print(
                      f"- Python oracle symbols: TP={acc['true_positive']} FP={acc['false_positive']} FN={acc['false_negative']} precision={acc['precision']} recall={acc['recall']}",
                      file=out,
                  )
                  if report["queries"]:
                      print("", file=out)
                      print("| Query | Actual | Missing | Extras |", file=out)
                      print("|---|---:|---:|---:|", file=out)
                      for query in report["queries"]:
                          print(
                              f"| {query['id']} | {len(query['actual'])} | {len(query['missing'])} | {len(query['extras'])} |",
                              file=out,
                          )
          PY
          cat __python_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark report
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-semantic-graph-benchmark
          path: |
            target/semantic-graph-benchmark/**/*.json
            __python_summary.md
          if-no-files-found: error
