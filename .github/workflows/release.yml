name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to release.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SQUEEZY_TELEMETRY: off
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-assets:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: squeezy-x86_64-apple-darwin.tar.gz
            binary-path: target/x86_64-apple-darwin/dist/squeezy
          - target: aarch64-apple-darwin
            os: macos-15
            archive: squeezy-aarch64-apple-darwin.tar.gz
            binary-path: target/aarch64-apple-darwin/dist/squeezy
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: squeezy-x86_64-unknown-linux-musl.tar.gz
            binary-path: target/x86_64-unknown-linux-musl/dist/squeezy
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
            archive: squeezy-aarch64-unknown-linux-musl.tar.gz
            binary-path: target/aarch64-unknown-linux-musl/dist/squeezy
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: squeezy-x86_64-pc-windows-msvc.zip
            binary-path: target/x86_64-pc-windows-msvc/dist/squeezy.exe

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH[-PRERELEASE]: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify tag matches workspace version
        shell: bash
        run: |
          tag_version="${RELEASE_TAG#v}"
          workspace_version="$(
            awk '/^\[workspace\.package\]/ {in_section=1; next}
                 /^\[/ {in_section=0}
                 in_section && /^version[[:space:]]*=/ {
                   match($0, /"[^"]+"/);
                   print substr($0, RSTART + 1, RLENGTH - 2);
                   exit
                 }' Cargo.toml
          )"
          if [[ -z "$workspace_version" ]]; then
            echo "could not read workspace.package.version from Cargo.toml" >&2
            exit 1
          fi
          if [[ "$tag_version" != "$workspace_version" ]]; then
            echo "release tag $RELEASE_TAG does not match Cargo.toml workspace version $workspace_version" >&2
            echo "bump workspace.package.version in Cargo.toml in the same commit as the tag." >&2
            exit 1
          fi
          echo "release tag $RELEASE_TAG matches workspace version $workspace_version"

      - name: Show Rust toolchain
        run: |
          rustup show
          rustc --version
          cargo --version

      - name: Ensure Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux release tools
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools file binutils

      - name: Install Windows binary inspection tools
        if: endsWith(matrix.target, '-windows-msvc')
        run: rustup component add llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check dependency policy
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: "1.96.0"
          command: check
          arguments: --all-features

      - name: Build release binary
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              export CC_x86_64_unknown_linux_musl=musl-gcc
              export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
              ;;
            aarch64-unknown-linux-musl)
              export CC_aarch64_unknown_linux_musl=musl-gcc
              export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=rust-lld
              ;;
            x86_64-pc-windows-msvc)
              export RUSTFLAGS="-C target-feature=+crt-static"
              ;;
          esac

          # On Windows also build the elevated-sandbox setup helper; the
          # squeezy-win-sandbox elevated tier resolves squeezy-sandbox-setup.exe
          # next to squeezy.exe (helper_materialization), so it must ship in the
          # archive or `squeezy doctor --sandbox-setup` fails.
          case "${{ matrix.target }}" in
            *-windows-msvc)
              cargo build --profile dist -p squeezy -p squeezy-win-sandbox --target "${{ matrix.target }}"
              ;;
            *)
              cargo build --profile dist -p squeezy --target "${{ matrix.target }}"
              ;;
          esac

      - name: Smoke-test release binary
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"
          target="${{ matrix.target }}"

          case "$target" in
            *-unknown-linux-musl)
              file "$binary"
              if readelf -l "$binary" | grep -q INTERP; then
                echo "Linux release binary has a dynamic program interpreter" >&2
                exit 1
              fi

              if readelf -d "$binary" 2>/dev/null | grep -q NEEDED; then
                echo "Linux release binary has dynamic library dependencies" >&2
                exit 1
              fi
              ;;
            *-windows-msvc)
              objdump="$(rustc --print sysroot)/lib/rustlib/$(rustc -vV | sed -n 's/^host: //p')/bin/llvm-objdump.exe"
              if command -v cygpath >/dev/null 2>&1; then
                objdump="$(cygpath -u "$objdump")"
              fi
              "$objdump" -p "$binary" | tee windows-imports.txt
              if grep -Eiq 'DLL Name: (vcruntime|msvcp|concrt|ucrtbase|api-ms-win-crt)' windows-imports.txt; then
                echo "Windows release binary imports C/C++ runtime DLLs; build with static CRT" >&2
                exit 1
              fi
              ;;
            *-apple-darwin)
              otool -L "$binary" | tee macos-dylibs.txt
              while IFS= read -r dylib; do
                case "$dylib" in
                  /usr/lib/*|/System/Library/*) ;;
                  *)
                    echo "macOS release binary depends on a non-system dylib: $dylib" >&2
                    exit 1
                    ;;
                esac
              done < <(awk 'NR > 1 { print $1 }' macos-dylibs.txt)
              ;;
          esac

          "$binary" doctor
          "$binary" --version
          "$binary" --help >/dev/null

      - name: Ad-hoc codesign macOS binary
        if: startsWith(matrix.target, 'x86_64-apple-darwin') || startsWith(matrix.target, 'aarch64-apple-darwin')
        shell: bash
        run: |
          binary="${{ matrix.binary-path }}"
          codesign --force --sign - "$binary"
          codesign -v "$binary"

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p dist/package
          target="${{ matrix.target }}"
          archive="${{ matrix.archive }}"
          binary="${{ matrix.binary-path }}"
          case "$target" in
            *-windows-*)
              cp "$binary" "dist/package/squeezy.exe"
              # Ship the elevated-sandbox setup helper alongside squeezy.exe.
              cp "$(dirname "$binary")/squeezy-sandbox-setup.exe" "dist/package/squeezy-sandbox-setup.exe"
              powershell -Command "Compress-Archive -Path dist/package/squeezy.exe,dist/package/squeezy-sandbox-setup.exe -DestinationPath dist/$archive -Force"
              sha=$(powershell -Command "(Get-FileHash -Algorithm SHA256 dist/$archive).Hash.ToLower()")
              printf '%s  %s\n' "$sha" "$archive" > "dist/$archive.sha256"
              ;;
            *)
              cp "$binary" dist/package/squeezy
              chmod +x dist/package/squeezy
              tar -C dist/package -czf "dist/$archive" squeezy
              shasum -a 256 "dist/$archive" > "dist/$archive.sha256"
              ;;
          esac

      - name: GPG-sign release archive
        if: ${{ env.RELEASE_GPG_PRIVATE_KEY != '' }}
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        shell: bash
        run: |
          archive="${{ matrix.archive }}"
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${RELEASE_GPG_PASSPHRASE:-}" \
            --armor --detach-sign --output "dist/$archive.asc" "dist/$archive"
          gpg --batch --verify "dist/$archive.asc" "dist/$archive"

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Upload release signature
        if: ${{ env.RELEASE_GPG_PRIVATE_KEY != '' }}
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-sig-${{ matrix.target }}
          path: dist/${{ matrix.archive }}.asc
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-assets
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t assets < <(find release-assets -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "no release assets found" >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes

  update-homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAP_REPOSITORY: esqueezy/homebrew-tap

    steps:
      - name: Skip without tap token
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update."

      - name: Checkout Squeezy
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release archives
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: scripts/update_homebrew_formula.sh "$RELEASE_TAG" release-assets homebrew-tap

      - name: Commit formula update
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          cd homebrew-tap
          if git diff --quiet -- Formula/squeezy.rb; then
            echo "Homebrew formula already matches ${RELEASE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/squeezy.rb
          git commit -m "Update squeezy to ${RELEASE_TAG}"
          git push

  update-winget:
    name: Update winget manifest
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      WINGET_PKGS_TOKEN: ${{ secrets.WINGET_PKGS_TOKEN }}
      WINGET_FORK_REPOSITORY: esqueezy/winget-pkgs

    steps:
      - name: Skip without token
        if: ${{ env.WINGET_PKGS_TOKEN == '' }}
        run: echo "WINGET_PKGS_TOKEN is not configured; skipping winget manifest update."

      - name: Checkout Squeezy
        if: ${{ env.WINGET_PKGS_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release archives
        if: ${{ env.WINGET_PKGS_TOKEN != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Checkout winget-pkgs fork
        if: ${{ env.WINGET_PKGS_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.WINGET_FORK_REPOSITORY }}
          token: ${{ env.WINGET_PKGS_TOKEN }}
          path: winget-pkgs-fork

      - name: Update manifest
        if: ${{ env.WINGET_PKGS_TOKEN != '' }}
        run: scripts/update_winget_manifest.sh "$RELEASE_TAG" release-assets winget-pkgs-fork

      - name: Commit and push manifest update
        if: ${{ env.WINGET_PKGS_TOKEN != '' }}
        shell: bash
        run: |
          cd winget-pkgs-fork
          version="${RELEASE_TAG#v}"
          manifest_dir="manifests/e/esqueezy/Squeezy/$version"
          if git diff --quiet -- "$manifest_dir"; then
            echo "winget manifest for $RELEASE_TAG is already up to date."
            exit 0
          fi

          branch="squeezy-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add "$manifest_dir"
          git commit -m "Add esqueezy.Squeezy ${version}"
          git push -u origin "$branch"
          echo "Pushed $branch to $WINGET_FORK_REPOSITORY. Open a PR against microsoft/winget-pkgs manually for the first release; subsequent releases can use 'gh pr create' once the bot has access."
