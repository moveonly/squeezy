repos:
  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        always_run: true
        types_or: [rust]

      - id: rust-layout
        name: Rust layout
        entry: python3 scripts/check_test_layout.py
        language: system
        pass_filenames: false
        always_run: true
        types_or: [rust]

      - id: gitleaks-staged
        name: Gitleaks staged secret scan
        entry: gitleaks protect --staged --redact --no-banner --no-color
        language: system
        pass_filenames: false
        always_run: true

      - id: actionlint
        name: GitHub Actions workflow lint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$

      # Runs the docs typo lint whenever any file under README.md, CONTRIBUTING.md,
      # docs/, or .github/ is staged. `pass_filenames: false` keeps `typos`
      # scanning the full set of doc paths (not just the staged subset) so
      # cross-file usages are still checked; `files:` keeps the hook idle on
      # pure code-only commits.
      - id: typos-docs
        name: Docs text lint
        entry: typos README.md CONTRIBUTING.md docs .github
        language: system
        pass_filenames: false
        files: ^(README\.md|CONTRIBUTING\.md|docs/|\.github/)
