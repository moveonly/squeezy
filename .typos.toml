[files]
extend-exclude = [
    "dist/",
    "target/",
]

[default.extend-words]
ratatui = "ratatui"
redb = "redb"
rustfmt = "rustfmt"
serde = "serde"
squeezy = "squeezy"
unparseable = "unparseable"
# Beads ticket slug fragment + short git-SHA fragment that look like
# typos when typos-cli tokenises identifiers on digits.
tje = "tje"
ba = "ba"
# Fragments from the generated UI/UX findings report: the `ctrl-pn` finding
# slug (Ctrl+P/N) and the hyphen-split `mis-` prefix (mis-placing, etc.).
pn = "pn"
mis = "mis"
