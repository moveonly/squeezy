id = "audit-attach-and-list"
title = "Audit · /attach <path> then /attachments lists 1"
description = """
Attaches `Cargo.toml` (a known workspace-rooted file), then asks for
the list. Asserts:
  - `/attach` emits `DispatchOutcome::Attached { id: <attachment_id> }`
    rendered as `attached:<id>`.
  - `/attachments` emits `AttachmentsList { count: 1 }` rendered as
    `attachments_list:1`.
The id is dynamic so the action_step status uses the prefix form.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/attach Cargo.toml"

[[steps]]
kind = "action"
action = "slash_command"
command = "/attachments"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
