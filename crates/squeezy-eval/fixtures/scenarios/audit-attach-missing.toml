id = "audit-attach-missing"
title = "Audit · /attach <bogus-path> returns Error"
description = """
Attaching a path that does not exist should land in
`DispatchOutcome::Error { command: "/attach", message: <io error> }`,
rendered as `error:<message>`. Pins that the attach failure path
surfaces cleanly instead of leaving the session in a half-attached
state.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/attach this-file-does-not-exist.txt"

[[steps]]
kind = "action"
action = "slash_command"
command = "/attachments"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
