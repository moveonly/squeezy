id = "audit-attachments-empty"
title = "Audit · /attachments with no attached items"
description = """
Bare `/attachments` on a fresh session. Should emit
`AttachmentsList { count: 0 }` rendered as `attachments_list:0`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/attachments"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
