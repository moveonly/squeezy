id = "audit-build-noop"
title = "Audit · /build from build mode is a no-op (changed=false)"
description = """
Confirms that calling `/build` while already in build mode returns
`ModeChanged { changed: false }` — captured by the eval driver as
`mode_build_changed=false`. Useful regression guard against an
accidental "always fires" change in `Agent::set_session_mode`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/build"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
