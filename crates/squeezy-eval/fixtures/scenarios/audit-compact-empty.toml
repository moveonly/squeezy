id = "audit-compact-empty"
title = "Audit · /compact on an empty conversation"
description = """
`/compact` with no prior turns. After squeezy-kkdb (audit B4), the
agent's `compact_context_manual` returns `Ok(None)` when there's
nothing to compact, and the dispatcher emits
`DispatchOutcome::Compacted { skipped: true }` — no raw error string
hits the status line. Prior to the fix this scenario produced an
`asserted_fail` / `error:agent error: not enough context to compact`
status; now it lands cleanly with `compacted:skipped=true`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/compact"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
