id = "audit-compact-undo-empty"
title = "Audit · /compact undo when no checkpoint exists"
description = """
`/compact undo` against a session that has never run `/compact`. The
typed handler returns `CompactedUndo { restored: false }`, surfaced
by the driver as `compact_undo:restored=false`. Pins that the "no
checkpoint" path doesn't error.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/compact undo"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
