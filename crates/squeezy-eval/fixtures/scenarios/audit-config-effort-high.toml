id = "audit-config-effort-high"
title = "Audit · /effort high sets reasoning effort"
description = """
`/effort high` is a session-scoped knob — does NOT open a modal,
sets app.status = "reasoning effort → high" and updates the agent
config snapshot's reasoning_effort field.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/effort high"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "reasoning effort"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "high"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
