id = "audit-config-model"
title = "Audit · /model opens config_screen focused on Models"
description = """
`/model` is a 1-line alias to `/options models` — both route through
toggle_config_screen with the Models SectionId. Asserts modal_active =
"config" and the Models section text is present.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/model"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "config"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Models"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
