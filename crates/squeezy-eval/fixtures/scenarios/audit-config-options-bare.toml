id = "audit-config-options-bare"
title = "Audit · /options (no arg) opens config_screen"
description = """
Bare `/options` should open the unified config screen (default to the
Models section). Asserts modal_active = "config" and a Models-section
substring in the frame. Esc closes back to no modal.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[[steps]]
kind = "action"
action = "slash_command"
command = "/options"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "config"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Models"

[[steps]]
kind = "action"
action = "send_key"
key = "Esc"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
