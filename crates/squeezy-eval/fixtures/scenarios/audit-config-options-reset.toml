id = "audit-config-options-reset"
title = "Audit · /options reset opens config_screen focused on Reset"
description = """
`/options reset` opens the config screen on the Reset section, used to
re-apply factory defaults. Asserts modal_active = "config" and the
"Reset" label appears in frame.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/options reset"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "config"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Reset"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
