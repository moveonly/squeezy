id = "audit-config-permissions"
title = "Audit · /permissions opens config_screen focused on Permissions"
description = """
`/permissions` is a 1-line alias to `/options permissions` — both
route through toggle_config_screen with the Permissions SectionId.
modal_active = "config" (NOT "permissions" — that legacy overlay isn't
reached from this entry point).
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/permissions"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "config"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Permissions"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
