id = "audit-config-statusline"
title = "Audit · /statusline opens status-line setup modal"
description = """
`/statusline` opens its own dedicated setup modal (status_line_setup),
NOT the unified config_screen. `current_modal` covers this overlay
since H1 (squeezy-nq30) — assert `modal_active = "statusline"`.
Esc closes it (status reports "cancelled").
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/statusline"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "statusline"

[[steps]]
kind = "action"
action = "send_key"
key = "Esc"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
