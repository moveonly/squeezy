id = "audit-config-verbosity-bare"
title = "Audit · /verbosity (no arg) prints current value + usage hint"
description = """
After squeezy-3ys0 / squeezy-a19z (audit U1+U2), bare `/verbosity` no
longer opens the config_screen — it prints the current value into
the transcript and reports the value in the status line, matching
the shape `/effort` has always used. No mode-switch surprise on
argument presence. To open the Verbosity section of the config
screen, use `/options verbosity`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/verbosity"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "response verbosity:"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
