id = "audit-config-verbosity-concise"
title = "Audit · /verbosity concise sets response verbosity"
description = """
`/verbosity concise` is a no-modal session knob — sets the status
line to "response verbosity → concise" and updates agent config.
Post-squeezy-a19z (audit U1) the surface is unified on the status
line (was app_notification before).
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/verbosity concise"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "response verbosity → concise"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
