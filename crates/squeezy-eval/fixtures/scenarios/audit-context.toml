id = "audit-context"
title = "Audit · /context emits consumed/remaining + per-source breakdown"
description = """
Bare `/context` dispatch. Pre-squeezy-rw0i this mirrored `/cost`'s
session_accounting payload (audit R2). After the fix /context leads
with consumed/remaining tokens against the context window and shows
a per-source consumption breakdown — verifiable by driving the TUI
and asserting on the rendered transcript text.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/context"

# System messages auto-collapse; expand so the rendered frame holds
# the full block we want to assert on.
[[steps]]
kind = "action"
action = "slash_command"
command = "/expand all"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Context window"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Consumption by source"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "consumed:"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "remaining:"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
