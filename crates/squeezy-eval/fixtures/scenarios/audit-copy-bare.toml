id = "audit-copy-bare"
title = "Audit · /copy bare (last assistant) and /copy transcript under TUI"
description = """
`/copy` is TUI-side: agent dispatch returns `TuiOnly`. With
`drive_tui = true` the TUI handler routes to `copy_to_clipboard` which
updates `app.status`. Seeds one mock turn so the assistant text exists
for the bare form, then asserts status text after each variant. Tests
both the bare `/copy` (last assistant) and `/copy transcript`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "allow"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "prompt"
text = "Reply with a short sentence the /copy command will grab."

[[steps]]
kind = "action"
action = "slash_command"
command = "/copy"

[[steps]]
kind = "action"
action = "slash_command"
command = "/copy transcript"

[expect]
max_wall_clock_seconds = 60
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[[mock.turns]]
text = "Hello from the assistant — the /copy command should grab this."
input_tokens = 25
output_tokens = 16

[triage]
enabled = false
