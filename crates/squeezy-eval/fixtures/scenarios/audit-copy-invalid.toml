id = "audit-copy-invalid"
title = "Audit · /copy <invalid-target> returns Error::Usage"
description = """
`/copy foo` (any target other than `transcript`) fails parsing with
`DispatchCommandParseError::Usage`, which the eval driver renders as
`error:usage: /copy [transcript]`. Pins the usage-error path so an
accidental "accept anything" change in the parser surfaces here.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/copy bogus"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
