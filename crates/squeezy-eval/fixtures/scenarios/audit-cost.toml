id = "audit-cost"
title = "Audit · /cost emits CostSnapshot"
description = """
Bare `/cost` dispatch with no prior turns. Asserts the typed
`DispatchOutcome::CostSnapshot { debug }` arm, surfaced by the eval
driver as the `cost_snapshot` action_step status.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/cost"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
