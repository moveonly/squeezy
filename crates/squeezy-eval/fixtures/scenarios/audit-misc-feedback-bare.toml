id = "audit-misc-feedback-bare"
title = "Audit · bare /feedback prints usage line (no network)"
description = """
`/feedback` with no args hits the empty branch in
`handle_feedback_command` and sets status to the usage line:
`usage: /feedback <what happened> | /feedback send | /feedback cancel`.
No agent call, no network. Asserts via `tui_status_contains` on a
distinctive substring.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/feedback"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "usage: /feedback"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
