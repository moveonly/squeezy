id = "audit-misc-feedback-preview"
title = "Audit · /feedback <text> sets 'feedback preview ready' (no network)"
description = """
`/feedback <message>` enters the preview branch of `handle_feedback_command`
which builds a redacted preview locally via `agent.prepare_feedback`.
No network call. Sets status to `feedback preview ready` and pushes a
preview line into the transcript. Asserts via `tui_status_contains`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/feedback the prompt history is hard to scroll"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "feedback preview ready"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
