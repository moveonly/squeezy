id = "audit-misc-keymap"
title = "Audit · /keymap lists default key bindings to transcript"
description = """
`/keymap` is a text-output command — no modal. Pushes a formatted
keymap listing into the transcript (system entry) and sets the status
to `keymap (defaults)` when no overrides exist. Mirrors the existing
`audit-config-keymap.toml` — kept here so the tasks-misc audit row
has a self-contained scenario.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/keymap"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "keymap"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
