id = "audit-misc-report-preview"
title = "Audit · /report (bare) builds bug report preview from active session"
description = """
Bare `/report` enters the preview branch of `handle_report_command`,
which resolves the active session_id and calls `agent.build_bug_report`
locally. No network call (send only happens on `/report send`).
Sets status to `report preview ready`. Asserts via `tui_status_contains`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/report"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "report preview ready"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
