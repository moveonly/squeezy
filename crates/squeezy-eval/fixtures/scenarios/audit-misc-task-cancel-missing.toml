id = "audit-misc-task-cancel-missing"
title = "Audit · /task-cancel <id> for missing job → 'task 999 not active'"
description = """
Canonical /task-cancel form. With no jobs spawned, `agent.cancel_job(999)`
returns false, so `apply_task_cancel` sets the status to
`task 999 not active`. Asserts via `tui_status_contains`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/task-cancel 999"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "task 999 not active"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
