id = "audit-misc-tasks"
title = "Audit · /tasks lists background jobs (empty state)"
description = """
Canonical /tasks form. With no jobs spawned, the TUI handler renders
"0 tasks" into the status line (see `format_tasks_list` and the
`app.status = format!("{} tasks", ...)` call in
`apply_dispatch_command`). Uses drive_tui = true so the TUI handler
actually runs and `TuiStatusContains` can pin the visible text.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/tasks"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "0 tasks"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
