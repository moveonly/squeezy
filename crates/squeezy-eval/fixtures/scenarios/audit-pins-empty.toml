id = "audit-pins-empty"
title = "Audit · /pins lists 0 pinned items on a fresh session"
description = """
Bare `/pins` against a clean session. Should emit
`PinsList { count: 0 }` rendered as `pins_list:0`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/pins"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
