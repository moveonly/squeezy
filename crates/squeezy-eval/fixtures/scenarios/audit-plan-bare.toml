id = "audit-plan-bare"
title = "Audit · /plan (bare) switches session mode to plan"
description = """
Agent-side dispatch of `/plan` with no prompt. Asserts the
`DispatchOutcome::ModeChanged { mode: "plan", changed: true }` shape
that the eval driver renders as `mode_plan_changed=true`. Scenario
starts in `mode = "build"` so the switch is a real change rather than
a no-op.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/plan"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
