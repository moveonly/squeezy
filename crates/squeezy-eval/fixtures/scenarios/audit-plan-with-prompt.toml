id = "audit-plan-with-prompt"
title = "Audit · /plan <prompt> switches mode and preserves the prompt"
description = """
`/plan <prompt>` switches mode and surfaces the prompt back through
`DispatchOutcome::ModeChanged.prompt`. Pre-fix (squeezy-9n9w / audit
B3), the agent dispatcher discarded the prompt while the TUI fed it
into a turn — silent data loss for non-TUI callers. Now both paths
see the prompt; non-TUI callers can decide what to do with it.
Asserts via the action-status string: `prompt_len=N` appears when
prompt was non-empty.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/plan summarize the repo structure"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected agent-side)"

[triage]
enabled = false
