id = "audit-plans-list-empty"
title = "Audit · /plans list with no persisted plans"
description = """
`/plans` (and its `list` alias) is TUI-side: the agent-side dispatch
returns `DispatchOutcome::TuiOnly { command: "plans" }`. With no
persisted plans for this session, the TUI handler sets status to
"no plans persisted in this session". This scenario asserts the
agent-side outcome (`tui_only:plans`) — companion `drive_tui = true`
scenarios pin the visible status.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/plans"

[[steps]]
kind = "action"
action = "slash_command"
command = "/plans list"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
