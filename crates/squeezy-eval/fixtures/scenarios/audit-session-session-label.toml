id = "audit-session-session-label"
title = "/session label <name> — runs twice, second is a dedupe no-op"
description = """
Add a label, then add the same label again. First call should land
`session_labelled:audit-foo` with `added = true` and the labels list
containing `audit-foo`. Second call should still emit
`session_labelled:audit-foo` (labels preserved) but `added = false` —
the dedupe path in `Agent::add_session_label`.
"""

[workspace]
local = "/tmp/audit-session-session-label-workspace"

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "allow"

[[steps]]
kind = "prompt"
text = "warm up"
wait_for = "turn_completed"

[[steps]]
kind = "action"
action = "slash_command"
command = "/session label audit-foo"

[[steps]]
kind = "action"
action = "slash_command"
command = "/session label audit-foo"

[expect]
max_wall_clock_seconds = 30
no_tool_errors = true

[mock]
default_text = "ack"
[[mock.turns]]
text = "ack"
input_tokens = 4
output_tokens = 1

[triage]
enabled = false
