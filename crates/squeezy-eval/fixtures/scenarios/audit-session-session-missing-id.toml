id = "audit-session-session-missing-id"
title = "/session <unknown-id> → SessionDetail { exists = false }"
description = """
Reference a session id that doesn't exist in the store. The agent's
`show_session` returns Err, dispatch lowers that to
`SessionDetail { exists: false }` per dispatch.rs:528 contract. Status
string in trace.jsonl should be `session_detail:does-not-exist:exists=false`.
"""

[workspace]
ephemeral = true

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "allow"

[[steps]]
kind = "action"
action = "slash_command"
command = "/session does-not-exist"

[expect]
max_wall_clock_seconds = 30
no_tool_errors = true

[mock]
default_text = "(no model turn expected)"

[triage]
enabled = false
