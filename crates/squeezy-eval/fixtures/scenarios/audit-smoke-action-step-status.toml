id = "audit-smoke-action-step-status"
title = "Audit smoke · action_step_status_contains for agent-side outcomes"
description = """
Non-drive_tui scenario asserting on the typed DispatchOutcome status
string recorded for the most-recent slash_command action step.
Backs squeezy-7hgd (audit H3) — lets scenarios verify structured
agent outcomes (e.g. jobs_list:N, mode_plan_changed=true) without
spinning up the live TUI.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/tasks"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "action_step_status_contains"
command = "/tasks"
contains = "jobs_list:"

[[steps]]
kind = "action"
action = "slash_command"
command = "/plan analyze the diff"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "action_step_status_contains"
command = "/plan analyze the diff"
contains = "prompt_len="

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
