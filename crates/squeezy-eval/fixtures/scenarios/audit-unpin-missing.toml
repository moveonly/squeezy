id = "audit-unpin-missing"
title = "Audit · /unpin <nonexistent-id> returns Error"
description = """
`/unpin pin-id-that-does-not-exist`. The agent's
`unpin_context_entry` returns an error, which dispatch wraps as
`DispatchOutcome::Error { command: "/unpin", message }`.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/unpin pin-id-that-does-not-exist"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback)"

[triage]
enabled = false
