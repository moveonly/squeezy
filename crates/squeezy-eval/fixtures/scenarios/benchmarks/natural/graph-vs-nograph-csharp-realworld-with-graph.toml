id = "graph-vs-nograph-csharp-realworld-with-graph"
title = "Newtonsoft.Json sync Read* override strategy audit — with graph (openai mini)"
description = """
Cross-language A/B (C#), real-world variant. Asks the model to
enumerate every `public override` of the nine sync `Read*` methods
declared on the abstract `Newtonsoft.Json.JsonReader` —
`Read()`, `ReadAsString()`, `ReadAsBytes()`, `ReadAsBoolean()`,
`ReadAsInt32()`, `ReadAsDecimal()`, `ReadAsDouble()`,
`ReadAsDateTime()`, `ReadAsDateTimeOffset()` — across the concrete
subclasses (`JsonTextReader`, `JsonValidatingReader`, `BsonReader`,
`TraceJsonReader`, `JTokenReader`) and classify each override by its
delegation strategy: `delegate` if the body forwards to the
same-named method on a private inner `JsonReader` field
(e.g. `_reader.ReadAsString()` in `JsonValidatingReader`, or
`_innerReader.ReadAsString()` in `TraceJsonReader`), `compute`
otherwise.

The expected answer has ~29 rows. Each row requires multi-step
reasoning: (a) hierarchy walk from `JsonReader` to its concrete
subclasses, restricted to non-test code; (b) per-subclass override
resolution for the nine sync `Read*` slots; (c) body inspection on
each override to detect whether the first non-trivial call has the
shape `<field>.<sameMethodName>()` where `<field>` is a private
`JsonReader`-typed field. A naive grep approach has to disambiguate
matches across `JsonReader`, `JsonWriter`, `JsonTextWriter`,
`BsonWriter`, `TraceJsonWriter`, and `JTokenWriter` (all of which
override their own `Read*` / `Write*` slots) and then open each
override body to classify strategy.

The graph answers (a) via `hierarchy` on `JsonReader`, (b) via
`decl_search` for each `Read*` slot scoped to that hierarchy, and
(c) via `read_slice` on each override; the no-graph half has to
grep every `public override` of the nine method names, manually
filter writer subclasses, and read each body.
"""

[workspace.github]
repo = "JamesNK/Newtonsoft.Json"
sha = "4f73e74372445108d2c1bda37b36e6f5e43402e0"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
The abstract class `Newtonsoft.Json.JsonReader` (declared in
`Src/Newtonsoft.Json/JsonReader.cs`) defines nine virtual sync
`Read*` slots:

- `public virtual bool Read()`
- `public virtual string? ReadAsString()`
- `public virtual byte[]? ReadAsBytes()`
- `public virtual bool? ReadAsBoolean()`
- `public virtual int? ReadAsInt32()`
- `public virtual decimal? ReadAsDecimal()`
- `public virtual double? ReadAsDouble()`
- `public virtual DateTime? ReadAsDateTime()`
- `public virtual DateTimeOffset? ReadAsDateTimeOffset()`

For every concrete (non-abstract) subclass of `JsonReader` declared
under `Src/Newtonsoft.Json/`, enumerate every `public override` of
those nine sync slots and classify each override's body by its
delegation strategy.

Do NOT confuse these with `JsonWriter`-side overrides (`JsonWriter`,
`JsonTextWriter`, `BsonWriter`, `TraceJsonWriter`, `JTokenWriter`)
or with async `Read*Async` overrides declared in files named
`*.Async.cs`. Only count sync `Read*` overrides whose enclosing
class transitively derives from `JsonReader`.

Exclude:
- Anything under `Src/Newtonsoft.Json.Tests/`.
- Files named `*.Async.cs` (async overrides are out of scope).
- The base class `JsonReader` itself.

Include both `public` and `internal` classes, and treat `partial`
classes as a single type — search every partial file when looking
for an override.

For each override, give exactly four fields, one per line, in the
order listed:
- `type`: subclass name (just the type, not the full path)
- `method`: the method name (e.g. `Read`, `ReadAsString`)
- `file_line`: the path relative to repo root plus the 1-based line
  number of the override's `public override` line, joined with `:`
  (e.g. `Src/Newtonsoft.Json/JsonTextReader.cs:488`)
- `strategy`: `delegate` if the override body invokes the same-named
  method on a private/internal `JsonReader`-typed field of the
  enclosing class (forms `<field>.<sameMethodName>()`, e.g.
  `_reader.ReadAsString()` or `_innerReader.Read()`); `compute`
  otherwise (the body parses internal state, calls a private helper
  like `ReadStringValue` / `ReadNumberValue` / `ReadNormal`, or
  computes the value any other way).

Output as a compact plain-text list. No prose, no extra commentary.
Group rows by `type` (all `JsonTextReader` rows, then all
`JsonValidatingReader` rows, etc.).
"""

[expect]
max_wall_clock_seconds = 540
max_input_tokens = 250000

[triage]
enabled = false
