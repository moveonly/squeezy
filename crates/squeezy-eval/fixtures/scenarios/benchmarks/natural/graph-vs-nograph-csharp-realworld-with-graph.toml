id = "graph-vs-nograph-csharp-realworld-with-graph"
title = "Newtonsoft.Json JsonConverter subclass hierarchy audit ā€” with graph (openai mini)"
description = """
Cross-language A/B (C#), real-world variant. Inventory every subclass of
the abstract `Newtonsoft.Json.JsonConverter` and report each
converter's IMMEDIATE base class. Most built-in converters extend
`JsonConverter` directly, but three date converters
(`IsoDateTimeConverter`, `JavaScriptDateTimeConverter`,
`UnixDateTimeConverter`) derive TRANSITIVELY through the intermediate
abstract base `DateTimeConverterBase`, which a grep `: JsonConverter`
misses or mislabels. The name `JsonConverter` also over-matches across
~40 production files as an attribute argument, collection element type,
field/parameter/return type. The graph resolves the full subclass
closure plus each immediate base in one decl_search/hierarchy call; the
no-graph half must grep, filter ~25 non-subclass references, and read
the date-converter declarations to recover the intermediate base.
"""

[workspace.github]
repo = "JamesNK/Newtonsoft.Json"
sha = "4f73e74372445108d2c1bda37b36e6f5e43402e0"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
We're cataloguing the JSON converters that ship inside Newtonsoft.Json.
The abstract base class `Newtonsoft.Json.JsonConverter` (declared in
`Src/Newtonsoft.Json/JsonConverter.cs`) is the root of the converter
hierarchy; the library bundles a set of built-in converters under
`Src/Newtonsoft.Json/Converters/`.

I need a complete inventory of every class that derives from
`JsonConverter`, INCLUDING the converters that derive from it only
INDIRECTLY through an intermediate abstract converter base (the
hierarchy is more than one level deep ā€” a few built-in converters do
NOT extend `JsonConverter` directly). For each converter I need to
know its IMMEDIATE base class.

Scope and rules:
- A class qualifies if it transitively derives from
  `Newtonsoft.Json.JsonConverter` (directly, or through an
  intermediate base class that itself derives from `JsonConverter`).
- Search the production tree under `Src/Newtonsoft.Json/` only.
- Do NOT include `JsonConverter` itself (it is the abstract root), and
  do NOT include the generic `JsonConverter<T>` base.
- Do NOT include classes that merely REFERENCE `JsonConverter` as a
  field type, parameter type, attribute argument (`[JsonConverter(
  typeof(...))]`), collection element type (`JsonConverterCollection`),
  return type, or local variable. Many serializer-internal and
  attribute classes mention `JsonConverter` without subclassing it ā€”
  exclude those. Only real subclasses count.
- Exclude anything under `Src/Newtonsoft.Json.Tests/`.

For EACH qualifying converter, output exactly ONE line:

  <Converter> : <ImmediateBaseClass>

where `<ImmediateBaseClass>` is the class named directly after the
colon in that converter's declaration ā€” its DIRECT parent. For most
converters this is `JsonConverter`, but for the date converters that
extend an intermediate abstract base the immediate base is that base
class (for example `DateTimeConverterBase`), NOT `JsonConverter`. Use
the plain type name ā€” no namespace, no generic arguments, no
interfaces.

Output only the lines, one per converter, no prose, no headers, no
extra commentary.
"""

[expect]
max_wall_clock_seconds = 540
max_input_tokens = 250000

[triage]
enabled = false
