id = "graph-vs-nograph-dart-realworld-with-graph"
title = "flutter WidgetsBindingObserver mixin lifecycle audit — with graph (openai mini)"
description = """
Cross-language A/B (Dart), realistic multi-step audit at scale. The
`WidgetsBindingObserver` mixin is defined in
`packages/flutter/lib/src/widgets/binding.dart` and exposes seventeen
default-noop lifecycle hooks (`didChangeMetrics`, `didPopRoute`,
`didChangeAppLifecycleState`, `handleStartBackGesture`, etc.). Fifteen
concrete classes scattered across twelve files under
`packages/flutter/lib/src/{widgets,material,cupertino}/` mix it in and
each picks a different non-empty subset of those hooks to override —
the rest are inherited as no-ops.

The corpus has fifteen mixers and forces cross-file navigation:
- `RootBackButtonDispatcher` and `PlatformRouteInformationProvider`
  both live in `widgets/router.dart` but mix the observer onto
  non-`State` base classes (`BackButtonDispatcher`, a
  `RouteInformationProvider`+`ChangeNotifier` combo).
- `ClipboardStatusNotifier` and `LiveTextInputStatusNotifier` mix it
  onto `ValueNotifier<T>` in `widgets/text_selection.dart`, and each
  overrides exactly one lifecycle hook
  (`didChangeAppLifecycleState`).
- `AppLifecycleListener` (`widgets/app_lifecycle_listener.dart`) mixes
  in two mixins and overrides two hooks
  (`didChangeAppLifecycleState`, `didRequestAppExit`).
- `_DropdownButtonState` and `_WidgetInspectorState` mix the observer
  in only to call `addObserver` / `removeObserver`; they override
  **no** lifecycle hooks at all — classifying these correctly as
  `(none)` is a key precision test.
- `_PredictiveBackGestureDetectorState` overrides four predictive-back
  hooks that no other class touches.

The semantic graph answers the mixer-set with a single `hierarchy`
query on `WidgetsBindingObserver` and a per-decl method lookup per
class; the no-graph half has to grep + read across twelve sibling
files in three subpackages.
"""

[workspace.github]
repo = "flutter/flutter"
sha = "6d7a86512e6e819c82cb7981aec9218a77cb2f35"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 64

[[steps]]
kind = "prompt"
text = """
The mixin `WidgetsBindingObserver` is declared in
`packages/flutter/lib/src/widgets/binding.dart`. It exposes seventeen
default-noop lifecycle hooks: `didPopRoute`, `handleStartBackGesture`,
`handleUpdateBackGestureProgress`, `handleCommitBackGesture`,
`handleCancelBackGesture`, `handleStatusBarTap`, `didPushRoute`,
`didPushRouteInformation`, `didChangeMetrics`,
`didChangeTextScaleFactor`, `didChangePlatformBrightness`,
`didChangeLocales`, `didChangeAppLifecycleState`, `didChangeViewFocus`,
`didRequestAppExit`, `didHaveMemoryPressure`,
`didChangeAccessibilityFeatures`.

For every concrete class declared under
`packages/flutter/lib/src/{widgets,material,cupertino}/` that mixes
in `WidgetsBindingObserver` (i.e. its `class ...` signature contains
`with ... WidgetsBindingObserver ...`), list the lifecycle hooks
that the class itself overrides (marked with `@override`, declared
inside that class's body).

Inclusion rules:
- Treat a class as a mixer when the `with` clause of its declaration
  literally names `WidgetsBindingObserver`. Indirect mixers (a class
  whose superclass mixes it in) do **not** count.
- Only count overrides of methods that are **defined on**
  `WidgetsBindingObserver` — the seventeen hooks listed above. Skip
  `initState`, `dispose`, `build`, `didChangeDependencies`,
  `didUpdateWidget`, `notifyListeners`, `toString`, `debugFillProperties`,
  and any other overrides that come from `State<T>`, `ChangeNotifier`,
  `Diagnosticable`, etc.
- Exclude anything under a `test/` directory, an `example/`
  directory, or anywhere outside
  `packages/flutter/lib/src/{widgets,material,cupertino}/`.
- Skip the base mixin itself (the declaration in
  `widgets/binding.dart`).
- A class that mixes in `WidgetsBindingObserver` but overrides zero
  lifecycle hooks is still in scope — emit one row for it with
  `hooks = (none)`.

For each mixer give exactly four fields, tab-separated, one row per
class, no header row:
- `file`: path relative to repo root containing the class declaration.
- `line`: 1-based line number of the `class <Name>` keyword line (the
  line where the `class` keyword appears, even if the `with` clause
  wraps onto a continuation line).
- `class`: the unqualified class name (e.g. `_WidgetsAppState`,
  `RootBackButtonDispatcher`).
- `hooks`: space-separated, alphabetically sorted list of overridden
  lifecycle hook names from the seventeen-name list above (e.g.
  `didChangeAppLifecycleState didPopRoute didPushRouteInformation`).
  When the class overrides none of the seventeen hooks, use the
  literal string `(none)` for this field.

Output the rows sorted in ascending order by `file`, then by `line`.
No prose, no header line, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 600
max_input_tokens = 300000

[triage]
enabled = false
