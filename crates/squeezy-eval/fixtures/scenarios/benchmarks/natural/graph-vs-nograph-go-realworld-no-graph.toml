id = "graph-vs-nograph-go-realworld-no-graph"
title = "spf13/cobra cross-package *Command method audit — no graph (openai mini)"
description = """
No-graph half of the realistic Go A/B. Same prompt and model as
`graph-vs-nograph-go-realworld-with-graph.toml` but with the entire
semantic graph tool family excluded. The model must rely on `grep`,
`glob`, and `read_file` to (a) enumerate distinct exported method
names called in `doc/`, (b) confirm each receiver is
`*cobra.Command` (and not `*pflag.FlagSet`, `cobra` package-level,
or a stdlib type), (c) locate each method's definition in the
cobra root package, and (d) collect the per-method caller-file
set. With no graph, each of these is a separate lexical sweep.
"""

[workspace.github]
repo = "spf13/cobra"
sha = "ad460ea8f249db69c943a365fb84f3a59042d54e"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
Audit every distinct exported method on the receiver type
`*cobra.Command` that is invoked anywhere in the cross-package
`doc/` directory of the `spf13/cobra` repo. An exported method
starts with an uppercase letter; the method is on `*cobra.Command`
when its receiver value is itself a `*cobra.Command` — this
includes obvious receivers (`cmd *cobra.Command`, `command
*cobra.Command`), traversal variables (`c` inside a `VisitParents`
callback or `for _, c := range cmd.Commands()`), `child` from a
range over `children := cmd.Commands()`, the result of
`cmd.Parent()`, and the indexed `s[i]` / `s[j]` where `s` is a
`[]*cobra.Command` slice.

Exclude:
  - Methods on any other receiver type (e.g. `*pflag.FlagSet`,
    package-level helpers like `cobra.WriteStringAndCheck`, std-lib
    methods like `strings.ReplaceAll`, `fmt.Fprintf`).
  - Anything inside a file ending in `_test.go`.
  - Doc comments and `//` lines.
  - Package-level functions on `cobra` (only methods on the
    `*Command` receiver count).

For each method emit exactly four fields, one per line per method,
separated by a blank line between methods:
  - `name`: the method name (e.g. `CommandPath`)
  - `def_file`: path relative to repo root of the file that
    contains the `func (... *Command) <name>(...)` declaration
  - `def_line`: 1-based line number of the `func` keyword in that
    declaration
  - `caller_files`: comma-separated, sorted list of `doc/` files
    that contain at least one call to this method (e.g.
    `doc/man_docs.go,doc/md_docs.go,doc/rest_docs.go,doc/yaml_docs.go`)

Sort the method blocks alphabetically by `name`. Output as a
compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 200000

[triage]
enabled = false
