id = "graph-vs-nograph-go-realworld-with-graph"
title = "hashicorp/terraform Meta-embedding composition audit â€” with graph (openai mini)"
description = """
Realistic Go A/B half. Enumerates every struct in terraform's
`internal/command/` package that embeds the base struct `Meta`
directly OR transitively (the sole intermediate is `StateMeta`,
which itself embeds `Meta`). Ground truth is the 43-type embedding
closure: 35 embed `Meta` directly, 4 embed ONLY `StateMeta`
(transitive), and 4 embed both. The base name `Meta` is heavy grep
noise (~400 `Meta` mentions as `c.Meta`, `*Meta` params, `Meta{...}`
literals, qualified selectors), so a lexical sweep over-matches; the
4 StateMeta-only types are reachable only by resolving the
`StateMeta -> Meta` edge. The graph returns every struct body (with
its anonymous-embed lines) from one `decl_search kind=struct`,
making each embed set directly readable.
"""

[workspace.github]
repo = "hashicorp/terraform"
sha = "24236f4f0bd10ada71d70868abe15f9d88099747"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format."""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
In the `hashicorp/terraform` repo, audit the CLI command struct hierarchy in
the `internal/command/` package that is built on the base struct `Meta`
(defined in `internal/command/meta.go`).

List every struct type in `internal/command/` that embeds `Meta` as an
anonymous (embedded) field, EITHER directly OR transitively. The only
intermediate base is `StateMeta` (declared in `internal/command/state_meta.go`),
which itself embeds `Meta`; a struct that embeds `StateMeta` therefore embeds
`Meta` transitively and must be included.

Rules:
  - Count a type ONLY when `Meta` and/or `StateMeta` appears as an ANONYMOUS
    embedded field (a bare `Meta` / `StateMeta` line inside the struct body),
    NOT when it is a NAMED field (e.g. `Meta Meta`) and NOT when `Meta` merely
    appears as a parameter type, return type, qualified selector (`c.Meta`,
    `m.Meta`), composite literal (`Meta{...}`), or pointer parameter (`*Meta`).
  - Include `StateMeta` itself (it embeds `Meta`).
  - Ignore `_test.go` files.

For each qualifying type output exactly one line:
    <TypeName> embeds <X>
where `<X>` is the set of base structs it embeds directly, drawn from
{`Meta`, `StateMeta`}, comma-separated when it embeds both (in the order
`Meta, StateMeta`). For example:
    ApplyCommand embeds Meta
    StateMvCommand embeds StateMeta
    StateListCommand embeds Meta, StateMeta

Sort the lines alphabetically by `<TypeName>`. Output only the plain-text list,
one type per line, no prose and no extra commentary.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 200000

[triage]
enabled = false
