id = "graph-vs-nograph-java-realworld-no-graph"
title = "google/gson TypeAdapter<T> subtype closure + immediate superclass — no graph (openai mini)"
description = """
No-graph half of the real-world Java audit A/B. Same prompt and model
as `graph-vs-nograph-java-realworld-with-graph.toml` but the entire
semantic graph tool family is excluded. The model has to fall back to
`grep` / `glob` / `read_file` to (a) enumerate the full `TypeAdapter`
subtype closure — `grep "extends TypeAdapter"` finds only the 14 direct
subclasses and MISSES the 4 transitive members
(`FutureTypeAdapter`/`TreeTypeAdapter` via
`SerializationDelegatingTypeAdapter`, `FieldReflectionAdapter`/
`RecordAdapter` via the nested `ReflectiveTypeAdapterFactory.Adapter`
base), so the agent must chase intermediate bases by hand — and then
(b) read each declaration to report the exact immediate superclass,
filtering 659 noisy `TypeAdapter` mentions across 35 files (imports,
type hints, anonymous `new TypeAdapter<X>(){}`, Javadoc examples).
"""

[workspace.github]
repo = "google/gson"
sha = "df53d2f1f50b1c3abb2937e7675867e3f284eb1a"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
I'm refactoring gson's `com.google.gson.TypeAdapter<T>` hierarchy and
need a COMPLETE inventory of every named class in the codebase that is a
subtype of `TypeAdapter` — not just the ones that say `extends TypeAdapter`
directly, but the WHOLE subtype closure, including classes that reach
`TypeAdapter` through an intermediate abstract base (for example a class
that extends `SerializationDelegatingTypeAdapter<T>`, or a nested
`Adapter` base, which in turn extends `TypeAdapter`).

For my refactor I specifically need, for each subtype, its IMMEDIATE
(direct) superclass — i.e. the exact type written after `extends` on that
class's declaration — so I can tell the direct `TypeAdapter` subclasses
apart from the ones that sit one level deeper in the chain.

Scope:
- ONLY look at paths under `gson/src/main/java/`. Ignore `proto/`,
  `extras/`, `metrics/`, `test-graal-native-image/`, `test-jpms/`,
  `test-shrinker/`, and any `src/test/` path.

Include:
- Top-level classes AND nested / inner / static-nested classes.
- Both classes whose direct base is `TypeAdapter<...>` and classes whose
  direct base is some OTHER class that is itself (transitively) a
  `TypeAdapter` subtype. Walk the chain to its end.

Exclude:
- Anonymous classes (`new TypeAdapter<X>() { ... }`).
- The abstract `TypeAdapter` base class itself.
- Any class named exactly `Adapter` (there are several unrelated nested
  `Adapter` classes — skip those as keys; but DO still report the
  uniquely-named classes that extend such an `Adapter` base).
- Declarations that appear inside Javadoc `/** ... */` blocks or `//`
  line comments (documentation examples, not real classes).

Output one line per subtype, in this exact shape:

  <ClassName> | extends <ImmediateSuperclassSimpleName>

where `<ClassName>` is the simple class name (no generics, no package)
and `<ImmediateSuperclassSimpleName>` is the simple name of the type that
appears directly after `extends` on that class's own declaration (this is
`TypeAdapter` for the direct subclasses, but the intermediate base name
for the deeper ones). Put the class name and its immediate superclass on
the SAME line. No prose, no extra commentary, just the list.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 250000

[triage]
enabled = false
