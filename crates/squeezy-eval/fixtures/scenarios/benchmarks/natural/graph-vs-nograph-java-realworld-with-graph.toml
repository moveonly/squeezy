id = "graph-vs-nograph-java-realworld-with-graph"
title = "google/gson TypeAdapter<T> subclass + first construction site — with graph (openai mini)"
description = """
Real-world Java audit A/B (with-graph half). The task is the kind of
audit a gson maintainer would run before refactoring how
`TypeAdapter` subclasses are instantiated: enumerate every named
class under `gson/src/main/java/` that directly extends
`com.google.gson.TypeAdapter<T>` and, for each one, pin the first
production call site that constructs an instance via `new
<ClassName>(`.

The graph half wins because the answer is fundamentally multi-step
and cross-file:
1. Hierarchy walk → enumerate the 18 direct subclasses, dropping
   anonymous `new TypeAdapter<X>() { ... }` instances, indirect
   subclasses that go through `SerializationDelegatingTypeAdapter`,
   and Javadoc-example declarations inside `TypeAdapter.java`.
2. For each subclass, `reference_search` for `new <Class>(`
   constructor sites in production code — many of these are
   constructed in a DIFFERENT file than the one that declares them
   (e.g. `TypeAdapterRuntimeTypeWrapper` is declared in its own
   file but FIRST constructed inside `MapTypeAdapterFactory.java`).
   The no-graph half has to grep per class name, filter Javadoc
   examples, and skip over `// ... new <Class> ...` line comments.

Three classes have no direct constructor call site: the abstract
`SerializationDelegatingTypeAdapter` and the abstract
`ReflectiveTypeAdapterFactory.Adapter` are never instantiated by
name (only their concrete subclasses are), so the model must
report `new_site: none` for them after exhausting the reference
walk — a discipline that graph evidence makes easy to assert and
plain grep makes easy to confuse.

Pair with `graph-vs-nograph-java-realworld-no-graph.toml` and
`squeezy-eval diff` to compare cost and accuracy.
"""

[workspace.github]
repo = "google/gson"
sha = "df53d2f1f50b1c3abb2937e7675867e3f284eb1a"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
Audit every named (non-anonymous) Java class declared under
`gson/src/main/java/` that **directly extends
`com.google.gson.TypeAdapter<T>`** (for any concrete or bounded `T`),
and pair each with the first production call site that constructs
an instance.

Scope:
- ONLY look at paths under `gson/src/main/java/`. Skip `proto/`,
  `extras/`, `metrics/`, `test-graal-native-image/`, `test-jpms/`,
  `test-shrinker/`, and every `src/test/` path.

Include:
- Both top-level (file-level) classes AND nested / inner / static
  nested classes whose direct base is `TypeAdapter<...>`.

Exclude:
- Anonymous classes (`new TypeAdapter<X>() { ... }`).
- The abstract `TypeAdapter` base class itself.
- Indirect subclasses that extend `TypeAdapter` only via an
  intermediate base (e.g. classes that extend
  `SerializationDelegatingTypeAdapter<T>` rather than `TypeAdapter<T>`
  directly).
- Occurrences inside Javadoc `/** ... */` block comments or `//`
  line comments (these are documentation, not real declarations).

For each direct subclass give exactly five fields, one per line:
- `file`: path of the class declaration, relative to repo root
- `line`: 1-based line number where the class declaration starts
- `class`: simple class name (no generics, no package)
- `new_site_file`: path of the FIRST production source line that
  constructs an instance via `new <ClassName>(` — search across
  every `.java` file under `gson/src/main/java/` (NOT only the
  declaring file), pick the lexicographically earliest path and
  then the lowest line number in that path; ignore lines inside
  `/** ... */` Javadoc or `//` line comments; report `none` if the
  class is abstract or otherwise never constructed by name.
- `new_site_line`: 1-based line number of that construction call
  site, or `none` if `new_site_file` is `none`.

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 250000

[triage]
enabled = false
