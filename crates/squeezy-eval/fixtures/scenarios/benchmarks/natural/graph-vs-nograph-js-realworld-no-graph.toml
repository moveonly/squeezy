id = "graph-vs-nograph-js-realworld-no-graph"
title = "sequelize BaseError transitive subclass tree — no-graph"
description = """
No-graph half of the sequelize BaseError subclass-tree
audit. Same prompt and pinned SHA as the with-graph half; graph tools
excluded and the graph-first exploration planner disabled. The model
must grep for `extends BaseError`, then chase every intermediate error
base (`ConnectionError`, `DatabaseError`, `ValidationError`) across the
`src/errors/connection/`, `database/`, and `validation/` subdirectories
and read ~24 one-class-per-file modules to recover each class's
immediate superclass, using only grep / glob / read_file.
"""

[workspace.github]
repo = "sequelize/sequelize"
sha = "fce5ad34fb70dc7fb12876d10213cf4ed51c7b96"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
In the sequelize repository, all public error classes live under
`src/errors/` and form an inheritance tree rooted at the abstract base
class `BaseError` (declared in `src/errors/base-error.ts`). Many error
classes extend `BaseError` directly, but several extend it only
indirectly through an intermediate error class — for example
`ConnectionError` extends `BaseError`, and `ConnectionTimedOutError`
extends `ConnectionError` (so it is a transitive subclass of
`BaseError`). These subclasses are scattered ONE PER FILE across
`src/errors/` and its subdirectories `src/errors/connection/`,
`src/errors/database/`, and `src/errors/validation/`.

I am refactoring how Sequelize errors are constructed and serialized,
so I need a complete inventory of the full `BaseError` subclass tree.
Enumerate EVERY error class declared under `src/errors/` that is a
subclass of `BaseError` — both the ones that extend `BaseError`
directly AND the ones that reach `BaseError` only transitively through
one or more intermediate error classes (so the `connection/`,
`database/`, and `validation/` subclasses must all be included). Do
NOT include `BaseError` itself, and do NOT include the built-in
JavaScript `Error`.

For EACH such class, output exactly one line:

  <ClassName> extends <ImmediateSuperclass>

where `<ImmediateSuperclass>` is the class named on that class's own
`extends` clause — its DIRECT parent, not necessarily `BaseError`. For
example `ConnectionTimedOutError extends ConnectionError` (NOT
`extends BaseError`), `TimeoutError extends DatabaseError`,
`UniqueConstraintError extends ValidationError`, and
`ConnectionError extends BaseError`. Use the class identifiers exactly
as written in the `class X extends Y` declarations.

Scope:
- ONLY error classes declared under `src/errors/` (including its
  `connection/`, `database/`, and `validation/` subdirectories).
- Every line must name a class whose chain of `extends` clauses
  eventually reaches `BaseError`.

Sort the lines lexicographically by `<ClassName>`. Output a compact
plain-text list, one class per line, in the exact format above. No
prose, no extra commentary, no headers.
"""

[expect]
max_wall_clock_seconds = 420
max_input_tokens = 220000

[triage]
enabled = false
