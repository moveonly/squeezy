id = "graph-vs-nograph-kotlin-realworld-no-graph"
title = "detekt-rules-complexity Rule subclass audit — no graph (openai mini)"
description = """
No-graph half of the Kotlin real-world A/B. Same prompt and pinned
SHA as the with-graph half; the semantic graph tool family is
removed and the graph-first exploration planner is disabled so the
model must fall back to `grep` / `glob` / `read_file`. Pair with
`graph-vs-nograph-kotlin-realworld-with-graph.toml` and run
`squeezy-eval diff`.
"""

[workspace.github]
repo = "detekt/detekt"
sha = "e9a4e755930ce3c23f59ff688b5e7679cdabf0cc"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
I plan to extract a common base class above the
`detekt-rules-complexity` rules. For every concrete top-level
`class X(config: Config) : Rule(...)` declared under
`detekt-rules-complexity/src/main/kotlin/dev/detekt/rules/complexity/`,
report exactly five fields, one per line:
- `file`: path relative to the repo root containing the declaration
- `line`: 1-based line number where the class declaration starts
  (the `class X(config: Config) :` line, even if the supertype list
  continues on the next line)
- `class`: the simple class name (no package)
- `rule_visit_count`: the number of `override fun visit*` methods
  declared DIRECTLY in the Rule class body. Do NOT count
  `override fun visit*` declared inside a nested `DetektVisitor`
  helper class (whether `inner class`, `private class`, or
  `internal inner class`). The Rule-class methods are at the
  outermost indentation level inside the class body (typically
  4 spaces in this module).
- `config_count`: the number of `by config(...)` delegated property
  declarations declared DIRECTLY in the Rule class body. Same nested
  rule applies — do not count delegated properties of nested helper
  classes (this module has none in practice, but state the rule).

EXCLUDE:
- `ComplexityProvider.kt` (it extends `DefaultRuleSetProvider`, not
  `Rule`).
- Anything under `src/test/`.
- Nested inner / private classes (they are not standalone Rule
  subclasses).

Output as a compact plain-text list, one row per Rule subclass,
fields separated by ` | `, sorted alphabetically by `class`. No
prose, no header row, no extra commentary. There should be exactly
15 rows.
"""

[expect]
max_wall_clock_seconds = 600
max_input_tokens = 250000

[triage]
enabled = false
