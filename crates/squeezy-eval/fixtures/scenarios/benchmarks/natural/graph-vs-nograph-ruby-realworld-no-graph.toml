id = "graph-vs-nograph-ruby-realworld-no-graph"
title = "rails/rails Arel::Nodes::Unary transitive subclass audit — no graph (openai mini)"
description = """
No-graph half of the Ruby real-world A/B on rails/rails Arel. Same
prompt as graph-vs-nograph-ruby-realworld-with-graph.toml. The semantic
graph family is excluded and the exploration planner is disabled; the
model must grep `< Unary` (which finds only the 13 direct Arel node
subclasses), then notice the intermediate nodes (Ordering, UnaryOperation,
With), read each scattered nodes/ file, and walk those bases up to
Arel::Nodes::Unary to recover the 6 transitive subclasses with their
correct immediate parent. A literal `< Unary` search misses them.
"""

[workspace.github]
repo = "rails/rails"
sha = "727dbb36405112e0e2dbf8ecb145e67f91e3c90c"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
In the rails/rails repository, Arel (its SQL AST library) defines its
node classes under `activerecord/lib/arel/nodes/`. They form a deep
inheritance tree rooted at `Arel::Nodes::Node`. One important mid-level
base is `Arel::Nodes::Unary` (declared in
`activerecord/lib/arel/nodes/unary.rb`), which represents a node wrapping
a single child expression.

Many node classes subclass `Unary` directly (`class X < Unary`). But
several reach `Unary` only INDIRECTLY, through an intermediate node class
they name on their own `<` line — for example `Ascending` and
`Descending` and `NullsFirst` and `NullsLast` all subclass `Ordering`
(and `Ordering < Unary`), `BitwiseNot` subclasses `UnaryOperation`
(and `UnaryOperation < Unary`), and `WithRecursive` subclasses `With`
(and `With < Unary`). These intermediate classes are themselves
subclasses of `Unary`, so their children are TRANSITIVE subclasses of
`Unary`, two or more hops deep.

I am refactoring how Arel unary nodes are visited and need a complete
inventory of the full `Arel::Nodes::Unary` subclass tree. Enumerate
EVERY node class declared under `activerecord/lib/arel/nodes/` that is a
subclass of `Arel::Nodes::Unary` — both the ones that subclass `Unary`
directly AND the ones that reach it only transitively through one or more
intermediate node classes. Do NOT include `Unary` itself, and do NOT
include classes that never reach `Unary` in their superclass chain (e.g.
the `Binary` family).

For EACH such class, output exactly one line:

  <ClassName> < <ImmediateSuperclass>

where `<ImmediateSuperclass>` is the class named on THAT class's own `<`
clause — its DIRECT parent, which is NOT always `Unary`. For example
`Ascending < Ordering` (NOT `< Unary`), `NullsLast < Ordering`,
`BitwiseNot < UnaryOperation`, `WithRecursive < With`, and for a direct
one `Grouping < Unary`. Use the short class names exactly as written on
each class's `<` line.

If you find fewer than about fifteen such classes, re-check: do not rely
on a text search for `< Unary`, because several qualifying classes reach
`Unary` transitively through an intermediate node and never name `Unary`
on their own line.

Scope:
- ONLY node classes declared under `activerecord/lib/arel/nodes/`.
- Every line must name a class whose chain of `<` clauses eventually
  reaches `Arel::Nodes::Unary`.

Sort the lines lexicographically by `<ClassName>`. Output a compact
plain-text list, one class per line, in the exact format above. No prose,
no extra commentary, no headers.
"""

[expect]
max_wall_clock_seconds = 540
max_input_tokens = 250000

[triage]
enabled = false
