id = "graph-vs-nograph-ruby-realworld-no-graph"
title = "sidekiq/sidekiq Component method-usage audit — no graph (openai mini)"
description = """
No-graph half of the Ruby real-world A/B. Same prompt as
`graph-vs-nograph-ruby-realworld-with-graph.toml`. The semantic
graph family is excluded and the exploration planner is disabled;
the model has to enumerate `include Sidekiq::Component` sites by
grep, reconstruct each enclosing module path by reading the
surrounding file, and grep each of the four target helper names
(`fire_event`, `safe_thread`, `handle_exception`, `watchdog`) with
manual filtering of the module definition itself, method-def lines,
and comments.
"""

[workspace.github]
repo = "sidekiq/sidekiq"
sha = "63f24c050bed5ab4e6b4efadb9f7f4f3932d5f0f"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
The `Sidekiq::Component` module (declared in
`lib/sidekiq/component.rb`) provides four runtime helper methods:
`fire_event`, `safe_thread`, `handle_exception`, and `watchdog`.

For every Ruby class under `lib/` that mixes in this module via an
`include Sidekiq::Component` directive in its class body, audit how
many times the class body invokes each of those four helpers as a
bare-name mixin dispatch (e.g. `fire_event(:startup)` or
`handle_exception(ex)` inside an instance method of the consumer
class).

Exclude:
- Anything under `test/`, `web/`, `bin/`, `examples/`, `myapp/`,
  `bare/`, or `docs/`.
- The `Sidekiq::Component` module declaration itself
  (`lib/sidekiq/component.rb`).
- Method-definition lines (`def fire_event`, etc.) — only count
  call sites.
- Comment-only matches (lines whose only occurrence of the helper
  name is inside a `#` comment).
- `require` lines and string-literal matches.

Treat each `class Foo` ... `include Sidekiq::Component` ... `end`
body that names the module on its own line as one entry. If two
distinct classes inside the same file both `include Sidekiq::Component`
(e.g. `Sidekiq::Scheduled::Enq` and `Sidekiq::Scheduled::Poller` in
`lib/sidekiq/scheduled.rb`), report them as two separate rows.

For each consumer class give exactly six fields, one per line, in
the order listed:
- `class`: fully-qualified Ruby class path, including every
  enclosing module (e.g. `Sidekiq::CLI`, `Sidekiq::Scheduled::Enq`,
  `Sidekiq::Metrics::ExecutionTracker`)
- `file`: path relative to repo root containing the
  `include Sidekiq::Component` line
- `fire_event`: integer count of call sites of `fire_event` in
  the class body (0 if none)
- `safe_thread`: integer count of call sites of `safe_thread`
  in the class body (0 if none)
- `handle_exception`: integer count of call sites of
  `handle_exception` in the class body (0 if none)
- `watchdog`: integer count of call sites of `watchdog` in the
  class body (0 if none)

Output as a compact plain-text list. No prose, no extra commentary.
Separate consumers with a blank line. Group rows by file path in
the order the include sites appear in `lib/`. If you find fewer
than 10 consumer classes, double-check — there are more than that
in this repo.
"""

[expect]
max_wall_clock_seconds = 540
max_input_tokens = 250000

[triage]
enabled = false
