id = "graph-vs-nograph-cpp-architectural-no-graph"
title = "spdlog base_sink<Mutex> direct subclasses — no graph (openai mini)"
description = """
No-graph half of the C++ architectural-audit A/B. Same prompt as the
with-graph counterpart, but the semantic-graph tool family is excluded
so the model must grep + read_file across `include/spdlog/sinks/`.
"""

[workspace.github]
repo = "gabime/spdlog"
sha = "d5275e3343c4dca4feb9fa772199181509f2a657"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
List every concrete C++ class declared under `include/spdlog/sinks/`
that derives **directly** from the class template
`spdlog::sinks::base_sink<Mutex>` (declared in
`include/spdlog/sinks/base_sink.h`).

Rules:
- Only direct subclasses. Exclude classes that inherit transitively
  via another sink template (e.g. `dist_sink<Mutex>`, `ansicolor_sink`,
  `wincolor_sink`, `stdout_sink_base`).
- Exclude `using` / `typedef` aliases such as `*_mt` / `*_st`.
- Exclude `base_sink` itself.
- Exclude anything outside `include/spdlog/sinks/` (tests, examples,
  bench).

For each class give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the class declaration
- `class`: the (unqualified) class name

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
