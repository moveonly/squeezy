id = "graph-vs-nograph-cpp-callers-with-graph"
title = "spdlog details::os::localtime callers — with graph (openai mini)"
description = """
Cross-language A/B (C++). Asks the model to enumerate non-test call
sites of the `time_t`-arg overload of `spdlog::details::os::localtime`.
"""

[workspace.github]
repo = "gabime/spdlog"
sha = "d5275e3343c4dca4feb9fa772199181509f2a657"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
List every call site of the `time_t`-arg overload of
`spdlog::details::os::localtime` (declared in
`include/spdlog/details/os.h:15`, inline-defined in
`include/spdlog/details/os-inl.h:87`).

Exclude:
- Files under `tests/`, `example/`, `bench/`.
- The defining file itself and the declaring header.
- Default-argument occurrences (not a call expression).

For each call site give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the call
- `caller`: enclosing function or method (with namespace, e.g.
  `spdlog::logger::err_handler_`)

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
