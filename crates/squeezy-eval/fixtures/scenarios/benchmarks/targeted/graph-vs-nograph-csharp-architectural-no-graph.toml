id = "graph-vs-nograph-csharp-architectural-no-graph"
title = "Newtonsoft.Json JsonReader hierarchy audit — no graph (openai mini)"
description = """
No-graph half of the C# architectural A/B. Same prompt as the
with-graph variant, but the semantic graph tools are removed so the
model has to fall back to grep + read_file across the repo.
"""

[workspace.github]
repo = "JamesNK/Newtonsoft.Json"
sha = "4f73e74372445108d2c1bda37b36e6f5e43402e0"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
List every concrete (non-abstract) subclass of the abstract class
`Newtonsoft.Json.JsonReader` defined under `Src/Newtonsoft.Json/`
in this repository. The base class is declared in
`Src/Newtonsoft.Json/JsonReader.cs`.

Exclude:
- Anything under `Src/Newtonsoft.Json.Tests/`.
- The base class itself.
- Indirect subclasses reached only through an intermediate base
  class declared inside `Src/Newtonsoft.Json.Tests/`.

Include both `public` and `internal` classes, and treat `partial`
classes as a single type (report the file containing the class
declaration that names the base list `: JsonReader`).

For each subclass give exactly four fields, one per line:
- `file`: path relative to repo root containing the class
  declaration line that names `JsonReader` as the base
- `line`: 1-based line number of the class declaration
- `type`: the subclass's name (just the type, not the full path)
- `iJsonLineInfo`: `yes` if that class declaration's base list
  directly lists the `IJsonLineInfo` interface, otherwise `no`.
  Inheritance of the interface through an intermediate base does
  not count.

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
