id = "graph-vs-nograph-dart-callers-with-graph"
title = "felangel/bloc LintContext.reportToken callers — with graph (openai mini)"
description = """
Cross-language A/B (Dart). Asks the model to enumerate every call site
of the instance method `LintContext.reportToken` declared in
`packages/bloc_lint/lib/src/linter.dart`. The repo also defines a
sibling `LintContext.reportTokenRange` whose name shares the
`reportToken` prefix; the model must disambiguate the two methods.
All six callers live inside `_Listener` subclasses under
`packages/bloc_lint/lib/src/rules/`, each of which is a Dart parser
listener that overrides one of several `beginXyz` callbacks.
"""

[workspace.github]
repo = "felangel/bloc"
sha = "ff675f7078aa90470b222a8ae07673522ef32233"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
List every call site of the instance method `reportToken` declared on
`LintContext` in `packages/bloc_lint/lib/src/linter.dart`.

Exclude:
- The definition site itself.
- Any call to the sibling method `reportTokenRange` (different method,
  same prefix).
- Anything under a `test/` directory.
- Anything under an `example/` directory.
- Doc-comment references (lines whose call appears inside `///` or
  `/** ... */`).

Include calls written as `context.reportToken(...)` and any other
syntactic form that resolves to the same `LintContext.reportToken`
method.

For each call site give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the call
- `caller`: enclosing method name (e.g. `_Listener.beginImport`)

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
