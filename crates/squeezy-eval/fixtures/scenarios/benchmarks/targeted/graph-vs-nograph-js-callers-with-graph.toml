id = "graph-vs-nograph-js-callers-with-graph"
title = "lodash _castPath callers — with graph (openai mini)"
description = """
Cross-language A/B (JavaScript). Asks the model to enumerate
cross-file call sites of the `castPath` default export from
`_castPath.js` in the `es` branch of `lodash/lodash`. Note: the scout
subagent fell back from chalk to lodash because chalk was too small
to host a 4+ caller target; the JS/TS graph code is exercised either
way.
"""

[workspace.github]
repo = "lodash/lodash"
sha = "d85490ebfb8f49ddc1eab84892aa33a3ef547894"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
The file `_castPath.js` defines and default-exports a function
`castPath(value, object)`. List every cross-file call site of
`castPath` in this repository — i.e. every place `castPath(...)` is
invoked outside `_castPath.js` itself, where the name is bound to the
default import from `./_castPath.js`.

Exclude:
- The definition file `_castPath.js`.
- `import` statements (count only call expressions).
- Anything under `.git/`.

For each call site give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the call
- `caller`: enclosing function (anonymous callbacks: name them after
  the surrounding function with a `<lambda>` suffix)

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
