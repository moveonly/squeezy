id = "graph-vs-nograph-kotlin-architectural-no-graph"
title = "detekt CliArgument sealed-interface subclass audit — no graph (openai mini)"
description = """
No-graph half of the Kotlin architectural A/B. Same prompt as the
with-graph variant, but the semantic graph tools are removed so the
model has to fall back to grep + read_file across the repo.
"""

[workspace.github]
repo = "detekt/detekt"
sha = "e9a4e755930ce3c23f59ff688b5e7679cdabf0cc"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
List every named subclass of the sealed interface
`dev.detekt.gradle.invoke.CliArgument`. The base interface is declared
in
`detekt-gradle-plugin/src/main/kotlin/dev/detekt/gradle/invoke/CliArgument.kt`.
Include both subclasses that name `CliArgument` directly in their
supertype list AND subclasses that reach it through the intermediate
sealed class `BoolCliArgument`.

Exclude:
- The sealed interface `CliArgument` itself.
- Anything under `src/test/`.
- Anonymous object expressions (`object : CliArgument { ... }`) — only
  named top-level declarations count.

For each subclass give exactly four fields, one per line:
- `file`: path relative to repo root containing the declaration
- `line`: 1-based line number where the subclass declaration starts
  (the line that introduces the type name, even if its supertype list
  continues on the next line)
- `type`: the subclass's simple name (no package, no generics)
- `kind`: one of `object`, `data class`, or `sealed class`, matching
  the Kotlin declaration form used at the declaration site
- `via`: `direct` if the supertype list names `CliArgument`, or
  `BoolCliArgument` if it only reaches `CliArgument` through the
  intermediate sealed class `BoolCliArgument`

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
