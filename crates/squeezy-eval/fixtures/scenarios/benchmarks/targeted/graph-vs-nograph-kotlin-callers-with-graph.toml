id = "graph-vs-nograph-kotlin-callers-with-graph"
title = "detekt KtModifierListOwner.isInternal callers — with graph (openai mini)"
description = """
Cross-language A/B (Kotlin). Asks the model to enumerate the non-test
call sites of the extension function
`dev.detekt.psi.isInternal` (defined as `KtModifierListOwner.isInternal()`
in `detekt-psi-utils/src/main/kotlin/dev/detekt/psi/KtModifierList.kt`).
The callers are spread across four sibling `detekt-rules-*` modules
and reach the receiver via four different concrete types
(`KtPrimaryConstructor`, `KtDeclaration`, `KtClass`, `KtNamedFunction`),
which exercises Kotlin extension-function dispatch the way the
semantic graph resolves it. Pair with
`graph-vs-nograph-kotlin-callers-no-graph.toml` and `squeezy-eval diff`
to compare cost and accuracy.
"""

[workspace.github]
repo = "detekt/detekt"
sha = "e9a4e755930ce3c23f59ff688b5e7679cdabf0cc"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
List every non-test call site of the Kotlin extension function
`dev.detekt.psi.isInternal` in this repository. It is defined as
`fun KtModifierListOwner.isInternal()` in
`detekt-psi-utils/src/main/kotlin/dev/detekt/psi/KtModifierList.kt`.

Exclude:
- Files under any `src/test/` directory.
- The definition site itself.
- `import` statements (count only call expressions).
- Any unrelated `isInternal` member declared on a different receiver
  type that does not resolve to `dev.detekt.psi.isInternal`.

For each call site give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the call
- `caller`: enclosing function or method (use `Class.method` form for
  methods, or the bare function name for top-level / extension
  functions)

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
