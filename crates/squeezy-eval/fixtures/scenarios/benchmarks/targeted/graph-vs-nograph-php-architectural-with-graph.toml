id = "graph-vs-nograph-php-architectural-with-graph"
title = "laravel/framework Cache\\Store implementations audit â€” with graph (openai mini)"
description = """
Cross-language A/B (PHP), architectural variant. Asks the model to
enumerate every concrete (non-abstract) class under
`src/Illuminate/Cache/` that implements the
`Illuminate\\Contracts\\Cache\\Store` interface â€” either directly or
transitively through the abstract `TaggableStore` base class â€” and
report, for each subclass, whether its class declaration directly
lists `Illuminate\\Contracts\\Cache\\LockProvider` in its `implements`
clause. Exercises hierarchy walking through an abstract intermediate
class and interface-implementation predicates, which the semantic
graph answers in a single `hierarchy` + per-decl lookup; the no-graph
half has to grep + read across the repo and resolve the
`implements`/`extends` chain by hand.

Pair with `graph-vs-nograph-php-architectural-no-graph.toml` and
`squeezy-eval diff` to compare cost and accuracy.
"""

[workspace.github]
repo = "laravel/framework"
sha = "c32ead90e14dfe04e98dc0639d3377b2605914dd"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
List every concrete (non-abstract) class declared under
`src/Illuminate/Cache/` that implements the interface
`Illuminate\\Contracts\\Cache\\Store`, either directly via an
`implements` clause or transitively by extending the abstract
`TaggableStore` base class declared in
`src/Illuminate/Cache/TaggableStore.php` (which itself implements
`Store`).

Scope:
- ONLY look at paths under `src/Illuminate/Cache/` (skip
  `Console/`, `Events/`, `RateLimiting/`, etc. subdirs of `Cache/`
  if they exist â€” only the top-level `src/Illuminate/Cache/*.php`
  files count).
- Skip everything under `tests/` and any file whose basename ends in
  `Test.php`.

Exclude:
- The abstract `TaggableStore` base class itself.
- Any class that is declared `abstract`.
- Interfaces and traits (only `class` declarations count).

For each subclass give exactly four fields, one per line:
- `file`: path relative to repo root containing the class
  declaration line
- `line`: 1-based line number of the `class` declaration
- `type`: the subclass's name (just the class name, not the full
  namespace)
- `lockProvider`: `yes` if that class declaration's `implements`
  clause directly lists `LockProvider` (the
  `Illuminate\\Contracts\\Cache\\LockProvider` interface, however it
  is written â€” bare name `LockProvider` or any aliased form),
  otherwise `no`. Inheritance of the interface through an
  intermediate base does not count.

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
