id = "graph-vs-nograph-csharp-callers-with-graph"
title = "Newtonsoft.Json CreateArgumentOutOfRangeException callers — with graph (openai mini)"
description = """
Cross-language A/B (C#). Asks the model to enumerate non-test call
sites of
`Newtonsoft.Json.Utilities.MiscellaneousUtils.CreateArgumentOutOfRangeException`.
"""

[workspace.github]
repo = "JamesNK/Newtonsoft.Json"
sha = "4f73e74372445108d2c1bda37b36e6f5e43402e0"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32

[[steps]]
kind = "prompt"
text = """
List every non-test call site of
`Newtonsoft.Json.Utilities.MiscellaneousUtils.CreateArgumentOutOfRangeException`
in this repository. The method is defined in
`Src/Newtonsoft.Json/Utilities/MiscellaneousUtils.cs`.

Exclude:
- Files under `Src/Newtonsoft.Json.Tests/`.
- The definition site itself.

For each call site give exactly three fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number of the call
- `caller`: enclosing method name (use `Class.Method` form)

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
