id = "graph-vs-nograph-java-realworld-with-graph"
title = "google/gson TypeAdapter<T> override audit — with graph (openai mini)"
description = """
Real-world Java audit A/B (with-graph half). The task is the kind of
audit a gson maintainer would actually run before changing the
TypeAdapter API: enumerate every named class under
`gson/src/main/java/` that directly extends
`com.google.gson.TypeAdapter<T>` and, for each one, decide whether the
class is nested or top-level, whether the class is abstract, and
whether it overrides `read(JsonReader)` and `write(JsonWriter, T)`.

The graph half wins because the answer is fundamentally multi-step:
1. Hierarchy walk → enumerate the 18 direct subclasses, dropping
   the abstract `TypeAdapter` base, anonymous `new TypeAdapter<X>()
   { ... }` instances, indirect subclasses that go through
   `SerializationDelegatingTypeAdapter`, and Javadoc-example
   declarations inside `TypeAdapter.java`.
2. For each subclass, inspect class modifiers and the two method
   slots. `hierarchy` + `symbol_context` give the structural facts
   directly. The no-graph half has to grep, read every candidate,
   walk braces to decide nested vs top-level, scan modifiers, and
   then re-read each method signature.

Three classes are abstract (`SerializationDelegatingTypeAdapter`,
`IntegerFieldsTypeAdapter`, `ReflectiveTypeAdapterFactory.Adapter`).
`SerializationDelegatingTypeAdapter` is the only one that does NOT
override `read`/`write`. Two more (`TreeTypeAdapter`,
`Gson.FutureTypeAdapter`) extend `SerializationDelegatingTypeAdapter`
and must be excluded as indirect subclasses — easy to overcount
without hierarchy.

Pair with `graph-vs-nograph-java-realworld-no-graph.toml` and
`squeezy-eval diff` to compare cost and accuracy.
"""

[workspace.github]
repo = "google/gson"
sha = "df53d2f1f50b1c3abb2937e7675867e3f284eb1a"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
Audit every named (non-anonymous) Java class declared under
`gson/src/main/java/` that **directly extends
`com.google.gson.TypeAdapter<T>`** (for any concrete or bounded `T`).

Scope:
- ONLY look at paths under `gson/src/main/java/`. Skip `proto/`,
  `extras/`, `metrics/`, `test-graal-native-image/`, `test-jpms/`,
  `test-shrinker/`, and every `src/test/` path.

Include:
- Both top-level (file-level) classes AND nested / inner / static
  nested classes whose direct base is `TypeAdapter<...>`.

Exclude:
- Anonymous classes (`new TypeAdapter<X>() { ... }`).
- The abstract `TypeAdapter` base class itself.
- Indirect subclasses that extend `TypeAdapter` only via an
  intermediate base (e.g. classes that extend
  `SerializationDelegatingTypeAdapter<T>` rather than `TypeAdapter<T>`
  directly).
- Occurrences inside Javadoc `/** ... */` block comments (these are
  documentation examples, not real declarations).

For each direct subclass give exactly seven fields, one per line:
- `file`: path relative to repo root
- `line`: 1-based line number where the class declaration starts
- `class`: simple class name (no generics, no package)
- `nested`: `yes` if the class is declared inside another type,
  `no` if it's the file's top-level class
- `abstract_class`: `yes` if the class declaration includes the
  `abstract` modifier, `no` otherwise
- `read_overridden`: `yes` if the class declares an override of
  `read(JsonReader)` (a method whose first parameter type is
  `JsonReader`), `no` otherwise
- `write_overridden`: `yes` if the class declares an override of
  `write(JsonWriter, T)` (a method whose first parameter type is
  `JsonWriter`), `no` otherwise

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 250000

[triage]
enabled = false
