id = "graph-vs-nograph-python-realworld-no-graph"
title = "psf/requests Session intra-class call graph ŌĆö no graph (openai mini)"
description = """
No-graph half of the realistic Python A/B. Same prompt and pinned SHA
as the with-graph half; graph tools excluded and the graph-first
exploration planner disabled. The model must close the method set
over the Session/SessionRedirectMixin hierarchy AND attribute each
intra-hierarchy self-call to the correct enclosing method body using
only `grep` / `glob` / `read_file`.
"""

[workspace.github]
repo = "psf/requests"
sha = "cd90742ed94d901759e26766197d0ce7c7bd9c8e"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
I want a per-method intra-hierarchy call graph for the `Session`
class (and its parent `SessionRedirectMixin`) in
`src/requests/sessions.py`. Treat the two classes as a single
hierarchy ŌĆö `Session(SessionRedirectMixin)` ŌĆö and let H be the set of
non-dunder method names defined on either class. (`__init__`,
`__enter__`, `__exit__`, `__getstate__`, `__setstate__` are dunders
and MUST be excluded from H. The `send` stub at line 132 on
`SessionRedirectMixin` is overridden by the real `send` on `Session`
at line 752 ŌĆö use the Session body when analyzing `send`.)

For EACH method name in H, inspect the body of the most-specific
definition in the hierarchy and list every OTHER name in H that the
body calls via a `self.<name>(...)` expression. Rules:
- Only count direct `self.<name>(...)` calls. Do not count
  `super().<name>(...)`, `cls.<name>(...)`, or calls through any
  other object.
- Do not count a method calling ITSELF (recursive self-calls are
  ignored).
- Do not count names that are NOT in H (e.g. `self.mount` IS in H,
  but `self.cookies.update(...)` is NOT ŌĆö `update` is not in H).
- Deduplicate: each callee appears at most once per caller.
- Callees within a single line are sorted alphabetically.

Output one line per method in H, sorted alphabetically by method
name, in this EXACT format:

  <method_name>: <comma-separated alphabetically-sorted callees, or `(none)`>

No prose, no extra commentary, no headers. Include methods whose
bodies make no intra-hierarchy self-calls ŌĆö show them with `(none)`.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
