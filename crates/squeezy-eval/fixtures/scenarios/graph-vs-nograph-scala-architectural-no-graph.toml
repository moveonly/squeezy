id = "graph-vs-nograph-scala-architectural-no-graph"
title = "akka/akka MailboxType subclasses audit — no graph (openai mini)"
description = """
No-graph half of the Scala architectural A/B. Same prompt as the
with-graph variant, but the semantic graph tools are removed so the
model has to fall back to grep + read_file across the repo.
"""

[workspace.github]
repo = "akka/akka"
sha = "d65463d1bc0d76f332959127c79ffacf3e14f3f2"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 32
excluded_tools = [
    "repo_map",
    "decl_search",
    "definition_search",
    "reference_search",
    "symbol_context",
    "hierarchy",
    "read_slice",
    "upstream_flow",
    "downstream_flow",
    "diff_context",
    "plan_patch",
    "refresh_compiler_facts",
]

[env_vars]
SQUEEZY_EXPLORATION_COMPILER = "0"

[[steps]]
kind = "prompt"
text = """
List every top-level (file-level) named class or case class declared
under `akka-actor/src/main/scala/akka/` whose declaration *directly*
extends the trait `akka.dispatch.MailboxType` (declared in
`akka-actor/src/main/scala/akka/dispatch/Mailbox.scala`).

Scope:
- ONLY look at paths under `akka-actor/src/main/scala/akka/`. Skip
  every other module, including `akka-actor-tests/`, `akka-docs/`,
  `akka-bench-jmh/`, and any `src/test/` path. The `extends
  MailboxType` clause must appear in the class's own declaration
  (`extends MailboxType` or `extends MailboxType with ...`); indirect
  inheritance via a named intermediate base does not count.

Exclude:
- The `MailboxType` trait itself.
- Anonymous classes (`new MailboxType { ... }`).
- Nested / inner classes declared inside another type (only the class
  at the file's top level counts).
- Occurrences inside a Scaladoc `/** ... */` block, `//` comments, or
  string literals.

Treat `class`, `final class`, `case class`, `final case class`, and
`private[akka] class` declarations uniformly.

For each subclass give exactly four fields, one per line:
- `file`: path relative to repo root containing the class declaration
- `line`: 1-based line number where the class declaration starts
  (the line containing `class <Name>(...)`, even when the
  `extends MailboxType ...` clause is on a continuation line)
- `type`: the subclass's simple name (no generics, no package)
- `pushTimeout`: `yes` if that same class declaration's base list
  *directly* mixes in `ProducesPushTimeoutSemanticsMailbox` (i.e.
  the declaration contains `with ProducesPushTimeoutSemanticsMailbox`),
  otherwise `no`. Inheritance of the marker trait through an
  intermediate base does not count.

Output as a compact plain-text list. No prose, no extra commentary.
"""

[expect]
max_wall_clock_seconds = 360
max_input_tokens = 200000

[triage]
enabled = false
