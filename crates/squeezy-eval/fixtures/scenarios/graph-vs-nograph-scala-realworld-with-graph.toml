id = "graph-vs-nograph-scala-realworld-with-graph"
title = "akka/akka RequiresMessageQueue mailbox audit â€” with graph (openai mini)"
description = """
Real-world Scala audit A/B (with-graph half). Models the kind of pre-
migration audit an Akka maintainer runs before touching the mailbox-
requirement contract: enumerate every class declared under
`akka-actor/src/main/scala/akka/` whose declaration *directly* mixes
in `akka.dispatch.RequiresMessageQueue[X]` and report per-class
modifiers + the `X` queue-semantics token + whether `ActorLogging`
is also mixed in. Exercises Scala-specific structural features:
- trait stacking (`extends Actor with ActorLogging with WithUdpSend
  with RequiresMessageQueue[...]`) across multi-line declarations,
- nested classes inside companion objects (`object Logging` /
  `object LocalActorRefProvider`),
- type-parameter classification (`UnboundedMessageQueueSemantics` vs
  `LoggerMessageQueueSemantics`),
- the trait/class boundary (Stash and UnboundedStash also mix in
  RequiresMessageQueue but are traits, not concrete declarations,
  and must be excluded).

There are 12 hits in the ground truth: 9 top-level classes plus 3
nested (Guardian, SystemGuardian inside object LocalActorRefProvider;
DefaultLogger inside object Logging). One (TcpConnection) is abstract;
the rest are concrete. Two map to `LoggerMessageQueueSemantics`
(DefaultLogger, JavaLogger), the other ten to
`UnboundedMessageQueueSemantics`. ActorLogging is mixed in by 7 of
the 12. The graph half resolves `RequiresMessageQueue` to its decl
and walks `hierarchy` / `reference_search` for declared mixins; the
no-graph half has to grep + read each candidate's multi-line base
list. Pair with `graph-vs-nograph-scala-realworld-no-graph.toml`.
"""

[workspace.github]
repo = "akka/akka"
sha = "d65463d1bc0d76f332959127c79ffacf3e14f3f2"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 48

[[steps]]
kind = "prompt"
text = """
Audit every named (non-anonymous) Scala class declared under
`akka-actor/src/main/scala/akka/` whose declaration *directly* mixes
in the trait `akka.dispatch.RequiresMessageQueue[X]` (for any
concrete `X`). The mixin must appear in the class's own `extends ...
with ...` base list; inheritance through an intermediate base does
not count.

Scope:
- ONLY look at paths under `akka-actor/src/main/scala/akka/`. Skip
  every other module, including `akka-actor-tests/`, `akka-testkit/`,
  `akka-bench-jmh/`, `akka-docs/`, and any `src/test/` path.

Include:
- Both file-level (top-level) classes AND nested classes declared
  inside another type (e.g. inside a companion `object`). Nested
  classes count as long as the *class's own* base list directly
  contains `with RequiresMessageQueue[...]`.

Exclude:
- The `RequiresMessageQueue` trait itself.
- The traits `Stash` and `UnboundedStash` in
  `akka-actor/src/main/scala/akka/actor/Stash.scala` â€” they mix in
  `RequiresMessageQueue` but are declared with `trait`, not `class`.
- Anonymous classes (`new SomeBase with RequiresMessageQueue[X] { ... }`).
- Occurrences inside a Scaladoc `/** ... */` block, a `//` comment,
  or a string literal.

Treat `class`, `final class`, `private class`, `private[akka] class`,
`private[io] class`, `final case class`, and `abstract class`
declarations uniformly â€” they all count if the declaration directly
mixes in `RequiresMessageQueue[X]`.

For each matching class give exactly six fields, one per line:
- `file`: path relative to repo root containing the class declaration
- `line`: 1-based line number where the class declaration starts
  (the line containing `class <Name>(...)` or `class <Name>`, even
  when the `with RequiresMessageQueue[...]` clause is on a later
  continuation line).
- `class`: the class's simple name (no generics, no package).
- `nested`: `yes` if the class is declared inside another type
  (object/class/trait), `no` if it's a file-level declaration.
- `abstract_class`: `yes` if the class declaration includes the
  `abstract` modifier, `no` otherwise.
- `actor_logging`: `yes` if the class's *own* base list also mixes
  in `ActorLogging` directly (i.e. the declaration contains
  `with ActorLogging`), `no` otherwise.
- `queue_semantics`: the simple name of the type argument `X` passed
  to `RequiresMessageQueue[X]` (e.g. `UnboundedMessageQueueSemantics`,
  `LoggerMessageQueueSemantics`).

Output as a compact plain-text list. Separate classes with a blank
line. No prose, no extra commentary. If you find fewer than 8 hits,
double-check â€” there are more than that in this repo.
"""

[expect]
max_wall_clock_seconds = 480
max_input_tokens = 250000

[triage]
enabled = false
