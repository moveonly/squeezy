id = "mcp-elicitation-form"
title = "MCP Form elicitation modal — styling + multiline input + Esc cancel"
description = """
Drives a live MCP `Form` elicitation through the TUI via the
`inject_mcp_elicitation` harness action, which synthesizes a request
straight into `pending_mcp_elicitation` (bypassing the MCP transport)
so the modal layer can be exercised offline.

Probe:

  1. Inject a `Form` elicitation; confirm the modal opens
     (`mcp_elicitation`) and the question renders in the frame
     alongside the `MCP request` header and Accept/Decline options.
  2. Type into the modal's answer field via `send_key`; confirm the
     modal stays up and accepts input without leaking to the composer.
  3. `Esc` cancels the elicitation without sending it to the model —
     the modal closes and the question text leaves the frame.

Suspect surfaces:
  * format_mcp_elicitation_menu_lines    @ crates/squeezy-tui/src/lib.rs
  * handle_mcp_elicitation_key           @ crates/squeezy-tui/src/lib.rs
  * inject_mcp_elicitation_into_harness  @ crates/squeezy-eval/src/driver.rs

Run with:

    cargo run -p squeezy-eval -- run \\
      crates/squeezy-eval/fixtures/scenarios/mcp-elicitation-form.toml \\
      --no-triage
"""

[workspace]
local = "."
snapshot = true

[squeezy]
provider = "mock"
mode = "build"
# Keep `permission_mode = "ask"` so the elicitation policy gate
# (`McpClientRegistry::set_elicitation_policy`, default `Ask`) is the
# code path a real run would hit.
permission_mode = "ask"
max_output_tokens = 256

[tui_capture]
enabled = true
drive_tui = true
width = 160
height = 48

# Inject a live Form elicitation directly into the harness modal slot.
[[steps]]
kind = "action"
action = "inject_mcp_elicitation"
[steps.request]
server = "docs"
kind = "form"
message = "Provide the documentation API key to continue"
schema = { type = "object", required = ["api_key"], properties = { api_key = { type = "string" } } }

# The modal must be the foreground surface.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "mcp_elicitation"

# The header, the violet+bold question, and the Accept option render.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "MCP request"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Provide the documentation API key to continue"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Accept"

# Type into the modal's answer field. The modal must stay up.
[[steps]]
kind = "action"
action = "send_keys"
keys = ["End", "x"]

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "mcp_elicitation"

# Esc cancels the elicitation without sending it to the model.
[[steps]]
kind = "action"
action = "send_key"
key = "Esc"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "none"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_does_not_contain"
text = "Provide the documentation API key to continue"

[expect]
max_wall_clock_seconds = 60
no_tool_errors = true

[triage]
enabled = true

[mock]
default_text = "(mock fallback — no scripted turn matched this prompt)"
