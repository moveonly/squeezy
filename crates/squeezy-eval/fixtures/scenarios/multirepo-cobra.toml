id = "multirepo-cobra"
title = "Graph nav probe: spf13/cobra (Go)"
description = """
Probes Go language support against a widely-used CLI framework.
Verifies cross-file navigation and the receiver-method graph that
Go-specific tooling needs.
"""

[workspace.github]
repo = "spf13/cobra"
sha = "ad460ea8f249db69c943a365fb84f3a59042d54e"

[squeezy]
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"

[[steps]]
kind = "prompt"
text = "Where is the `Command` struct defined? Reply with file path only."

[[steps]]
kind = "prompt"
text = "List the first three public methods on `*Command` in declaration order. One per line."

[[steps]]
kind = "prompt"
text = "How does `Command.Execute` differ from `Command.ExecuteC`? Cite each piece of evidence with one of squeezy's confidence labels (exact_syntax, import_resolved, candidate_set, external, unknown); use `label_missing` if no label is available."

[expect]
final_text_contains = ["Execute"]
max_wall_clock_seconds = 180
max_input_tokens = 200000
max_tools_per_turn = 8

[triage]
enabled = true
model = "gpt-5.4-mini"
focus = "Go-specific gaps: missing receiver-method graph, wrong file paths, hallucinated symbols, planner over-fetch. Ignore stylistic feedback."
