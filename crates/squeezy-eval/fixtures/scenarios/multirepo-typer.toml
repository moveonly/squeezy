id = "multirepo-typer"
title = "Graph nav probe: tiangolo/typer (Python)"
description = """
Probes Python language support against a popular CLI framework that
relies heavily on decorators and type hints — a stress test for the
graph extractor's awareness of Python idioms.
"""

[workspace.github]
repo = "tiangolo/typer"
sha = "8d956dd26067fcefd664e94259de33b58ba8754a"

[squeezy]
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"

[[steps]]
kind = "prompt"
text = "Where is the `Typer` class defined (file + one-sentence purpose)?"

[[steps]]
kind = "prompt"
text = "Find one test that constructs a `Typer` app and runs a command via `CliRunner`. Cite the test file path and the test function name."

[[steps]]
kind = "prompt"
text = "Which decorator turns a function into a Typer command? Cite the implementation with a confidence label (exact_syntax, import_resolved, candidate_set, external, unknown); use `label_missing` if no label is available."

[expect]
final_text_contains = ["typer"]
max_wall_clock_seconds = 180
max_input_tokens = 200000
max_tools_per_turn = 8

[triage]
enabled = true
model = "gpt-5.4-mini"
focus = "Python-specific gaps: missing tree-sitter coverage, wrong import resolution, hallucinated decorator targets, planner over-fetch. Ignore stylistic feedback."
