id = "multirepo-walkdir"
title = "Graph nav probe: BurntSushi/walkdir (Rust)"
description = """
Probes squeezy's Rust language support against a small, well-known
external crate. Goal: surface gaps in cross-repo graph navigation that
do not show up when probing squeezy itself (where the agent has rich
local context). Cheap — 3 turns at gpt-5.4-mini.
"""

[workspace.github]
repo = "BurntSushi/walkdir"
sha = "6fd031c82ba5a4204b4ce6eae73dacb00dc072ec"

[squeezy]
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"

# Probe 1: definition site of a real public symbol.
[[steps]]
kind = "prompt"
text = "In one short sentence: what does the `WalkDir` struct represent, and what file declares it?"

# Probe 2: cross-reference / call graph.
[[steps]]
kind = "prompt"
text = "Name two distinct call sites of `WalkDir::new` inside this crate's source tree. Reply as a bullet list."

# Probe 3: confidence labels.
[[steps]]
kind = "prompt"
text = "How is `walkdir::Error` produced? Cite each piece of evidence with one of squeezy's confidence labels (exact_syntax, import_resolved, candidate_set, external, unknown). Mark evidence with no label as `label_missing`."

[expect]
final_text_contains = ["walkdir"]
max_wall_clock_seconds = 180
max_input_tokens = 200000
max_tools_per_turn = 8

[triage]
enabled = true
model = "gpt-5.4-mini"
focus = "cross-repo Rust graph navigation defects: wrong file paths, missing confidence labels, planner over-fetch, hallucinated symbols. Ignore stylistic feedback."
