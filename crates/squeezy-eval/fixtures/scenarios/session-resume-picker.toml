id = "session-resume-picker"
title = "Probe: session-resume picker → start path, near-zero-event session shape"
description = """
Bug-hunt slice for the `session-resume-picker` area
(see EVAL_COVERAGE_PLAN.md). Runs entirely offline with the scripted
mock provider and drives the live `TuiHarness` so the agent + TuiApp
boot through the same code paths a real Resume would (apart from the
picker overlay itself, which lives outside the harness — see the
finding write-up for details).

What the probe pins:

  1. A first-frame paint exists. `run_inner` writes the
     "Resuming session…" / "Starting session…" placeholder via
     `draw_startup_placeholder` before the agent finishes initialising.
     We can't observe the picker → placeholder transition through the
     harness, but we *can* assert that the very first `render_frame`
     produced after `TuiHarness::new` paints a usable composer rather
     than a blank viewport — i.e. there is no startup race where the
     TUI accepts input before the renderer is wired up.

  2. A near-zero-event session lands in a usable transcript. The
     scenario runs a single trivial mock turn; that is the same
     post-resume shape a user would see if they picked a 1-prompt
     entry from the picker (`SessionSummary::turn_count == 1`,
     "1 prompt" row label) and Agent::resume replayed the log.

  3. A second prompt after the first lands cleanly. This pins the
     deferred `GraphManager::open_with_store` path introduced in
     PR #153 — if there is a race where the TUI accepts the next
     prompt before background workspace state is ready, the second
     turn would surface a tool error or a stuck status.

If the harness ever grows a `TuiHarness::new_resume(...)` entry point
this scenario should be extended to (a) seed an `events.jsonl` with
zero/one event, (b) call the resume path, (c) assert
`tui_frame_contains "Resuming session…"` on the first frame. Until
then this scenario is the closest reachable regression guard.
"""

[workspace]
local = "."
snapshot = true

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "allow"

[tui_capture]
enabled = true
drive_tui = true
width = 160
height = 48

# Turn 1 — the "near-zero events" shape. A single short user turn
# produces exactly the transcript a resumed 1-prompt session would
# present after Agent::resume replays the event log.
[[steps]]
kind = "prompt"
text = "ping"
wait_for = "turn_completed"

# Assert the assistant text actually rendered into the visible frame.
# Catches the "TUI accepted the prompt but never painted the reply"
# class of regressions — the symptom a stuck `GraphManager::open_with_store`
# race would surface as.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "pong"

# Turn 2 — a follow-up prompt. If the deferred graph open were racing
# with input handling we would see this turn either error or stall.
[[steps]]
kind = "prompt"
text = "again"
wait_for = "turn_completed"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "pong-2"

# NOTE: a `text_contains` / `final_text_contains` style assertion
# against the driver's accumulated assistant text would be ideal here
# but does not work when `drive_tui = true` — the harness path routes
# assistant deltas through the TuiApp transcript, not the driver's
# `last_assistant_text` accumulator, so `text_contains` always fails
# under the live harness. Both `tui_frame_contains` asserts above
# already pin the user-visible expectation; adding a driver-side
# check would only produce a spurious `expect_final_text_contains`
# finding on every clean run.

[expect]
max_wall_clock_seconds = 30
no_tool_errors = true
# Two prompt turns + a handful of action steps; the mock provider does
# no tool calls. Generous ceiling so flakes on slow CI don't poison
# the guard.
max_input_tokens = 5000

[mock]
default_text = "pong"

[[mock.turns]]
text = "pong"
input_tokens = 8
output_tokens = 1

[[mock.turns]]
text = "pong-2"
input_tokens = 9
output_tokens = 2

[triage]
enabled = false
