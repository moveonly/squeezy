id = "tui-reasoning-expand-anthropic"
title = "Reproduce: Ctrl+O on reasoning entries (real LLM)"
description = """
Drives the live TuiApp end-to-end via the eval `TuiHarness`. A real
Anthropic call (`claude-haiku-4-5-20251001` with
reasoning_effort = high) produces a reasoning segment in the
transcript. The scenario then presses `Ctrl+O` and asserts on the
rendered frame text — not just the collapsed flag — so the test
catches the symptom the user reports: pressing the expand key but
seeing no visible change.

Before Ctrl+O the frame must contain `▸ reasoning:` (the collapsed
chip with summary). After Ctrl+O the frame must contain
`▾ reasoning` (the expanded header) plus a body line marker `▏`.

Requires `ANTHROPIC_API_KEY`. Run with:

    ANTHROPIC_API_KEY=... cargo run -p squeezy-eval -- run \\
      crates/squeezy-eval/fixtures/scenarios/tui-reasoning-expand-anthropic.toml
"""

[workspace]
local = "."

[squeezy]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
mode = "build"
permission_mode = "allow"
reasoning_effort = "high"
max_output_tokens = 2000
# Pin the user-visible config (reasoning chip ON) so the scenario
# repros the bug the user actually sees, regardless of the host's
# global `show_reasoning_usage` setting.
show_reasoning_usage = true

[tui_capture]
enabled = true
drive_tui = true
width = 160
height = 48

[[steps]]
kind = "prompt"
text = "Think about the trade-offs between a hash map and a B-tree for a small (~100 entry) keyed cache. Answer in one short sentence."
wait_for = "turn_completed"

# Sanity: the rendered frame shows the collapsed reasoning chip.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "▸ reasoning"

[[steps]]
kind = "action"
action = "send_key"
key = "Ctrl+O"

# After the toggle, the chip must flip from ▸ to ▾ AND a body line
# marker (▏) must appear in the rendered frame. Asserting on cells,
# not on the collapsed flag, is what makes this a real repro of the
# user-visible bug — flipping the flag is necessary but not
# sufficient.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "▾ reasoning"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "▏"

# Belt-and-braces: the status line still reports the toggle so the
# user gets feedback even on terminals where the chevron change is
# easy to miss.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "expanded"

[expect]
max_wall_clock_seconds = 120
no_tool_errors = false

[triage]
enabled = false
