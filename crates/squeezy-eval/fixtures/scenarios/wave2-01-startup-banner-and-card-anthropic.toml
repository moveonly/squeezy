id = "wave2-01-startup-banner-and-card-anthropic"
title = "Wave-2 / domain 01 — startup banner + card on Anthropic claude-haiku-4-5"
description = """
Wave-2 row 01 (startup-banner-and-card) cross-provider companion to
the OpenAI scenario. Probes the first-frame banner against Anthropic
Haiku 4.5 to detect cross-model rendering regressions in
`startup_card_lines` (`crates/squeezy-tui/src/lib.rs:5504`). All three
provider scenarios use the same `tui_frame_contains` shape so a
divergence is itself the finding.

Requires `ANTHROPIC_API_KEY` exported in the shell. Run with:

    cargo run -p squeezy-eval -- run \\
        crates/squeezy-eval/fixtures/scenarios/wave2-01-startup-banner-and-card-anthropic.toml \\
        --no-triage
"""

[workspace]
local = "."
snapshot = true

[squeezy]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
mode = "build"
permission_mode = "allow"
max_output_tokens = 256

[tui_capture]
enabled = true
drive_tui = true
width = 120
height = 36
palette_tone = "dark"

[[steps]]
kind = "prompt"
text = "Say 'ok' and stop."
wait_for = "turn_completed"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = ">_ Squeezy v"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "anthropic:claude-haiku-4-5-20251001"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "languages"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "directory"

[expect]
max_wall_clock_seconds = 90
no_tool_errors = true

[triage]
enabled = false
