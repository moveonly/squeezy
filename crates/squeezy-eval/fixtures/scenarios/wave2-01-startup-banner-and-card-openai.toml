id = "wave2-01-startup-banner-and-card-openai"
title = "Wave-2 / domain 01 — startup banner + card on OpenAI gpt-5.4-mini"
description = """
Wave-2 row 01 (startup-banner-and-card). Probes the first-frame
banner strip legibility, language summary accuracy, and the provider /
model readout against the OpenAI live provider. The current first frame
emits the lunar phase strip + `Squeezy v<version>` header from
`startup_phase_strip`/`startup_card_lines`; the provider/model and
language summary moved to the live status line (`render_status_detail_line`),
so the card no longer carries the dynamic dir/languages/model fields.
The scenario captures the booted TUI frame after a trivially short
prompt and asserts on the strip header, the `provider:model` status
item, and the resolved language summary value so a banner or
status-line regression trips a `tui_frame_contains` finding.

Requires `OPENAI_API_KEY` exported in the shell. Run with:

    cargo run -p squeezy-eval -- run \\
        crates/squeezy-eval/fixtures/scenarios/wave2-01-startup-banner-and-card-openai.toml \\
        --no-triage
"""

[workspace]
local = "."
snapshot = true

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
max_output_tokens = 256

[tui_capture]
enabled = true
drive_tui = true
width = 120
height = 36
palette_tone = "dark"

# A near-zero-cost prompt so the TUI boots, paints its first frame
# (the startup card) and the language summary / model row are
# resolved against the live AppConfig before assertions fire.
[[steps]]
kind = "prompt"
text = "Say 'ok' and stop."
wait_for = "turn_completed"

# Banner identity: the "Squeezy v<version>" header in the phase strip.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Squeezy v"

# Provider + model: the status line's ProviderAndModel item echoes the
# configured pair exactly.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "openai:gpt-5.4-mini"

# Language summary accuracy: the status line carries the resolved
# language summary value (this repo is Rust), not a "languages" label.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Rust"

[expect]
max_wall_clock_seconds = 90
no_tool_errors = true

[triage]
enabled = false
