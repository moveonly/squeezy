id = "wave2-16-status-line-cost-portkey"
title = "Wave-2 / 16 status-line-and-cost — Portkey @openrouter/qwen3.6-35b-a3b"
description = """
Domain 16 of the wave-2 bug-hunt, Portkey/Qwen sibling. Mirrors the
OpenAI and Anthropic probes but pins `tool_choice = "required"` so the
Qwen3 chatty-preamble pattern
(`stop_with_intent_text_no_tool_call`) cannot mask whether the model
actually issues a tool call that accrues cost before the cap fires.
Portkey key lives in `~/.squeezy/settings.toml`.

Same domain-16 questions as the sibling fixtures:

  - The status-line cost segment (`crates/squeezy-tui/src/status.rs:520-542`)
    must format the cap-aware variant `cost ${spent} / ${cap:.2} (N%)`
    when `cost_cap_usd_micros = Some(cap > 0)` per
    `crates/squeezy-tui/src/lib.rs:10812`. The Portkey/OpenRouter
    cost-tracking path threads through the same
    `squeezy_llm::estimate_cost` chain; if Qwen3.6 lacks a pricing
    entry the cost segment will read `$0.00 / $0.01 (0%)` indefinitely
    and the cap will never trip — that is the finding (cross-model
    inconsistency + functionality).
  - The CostBroker (`crates/squeezy-agent/src/cost_broker.rs:67`)
    only emits a `CostWarning` / cap-reached short-circuit when the
    integer micro-USD count crosses the threshold. A regression that
    leaves Portkey costs at zero hides the warning entirely.
  - Wave-2 palette rule: all accent constants in
    `crates/squeezy-tui/src/render/palette.rs:47-49` sit at luminance
    ~96-114, comfortably under the wave-2 guardrail. Any cell
    rendering at luma > 160 in the status detail line is a finding
    regardless of provider.
  - Default status-line items order
    (`DEFAULT_STATUS_LINE_ITEMS`,
    `crates/squeezy-tui/src/status.rs:29-36`): provider-and-model,
    current-dir, git-branch, pull-request-number, branch-changes,
    cost. A regression that reorders these on Portkey only would be
    a cross-model consistency finding.

Probe shape:

  - Snapshot workspace so any model-attempted edits never reach the
    live checkout.
  - `tool_choice = "required"` so Qwen's chatty preamble cannot
    swallow the shell call.
  - One real turn; `instructions` text steers to one shell tool call.
  - `max_session_cost_usd_micros = 10_000` (≈$0.01) per the wave-2
    brief.

Requires `[providers.portkey] api_key = "..."` in
`~/.squeezy/settings.toml`. Provider config errors are a medium
finding, not an abort, per the wave-2 brief.
"""

[workspace]
local = "."
snapshot = true

[squeezy]
provider = "portkey"
model = "@openrouter/qwen/qwen3.6-35b-a3b"
tool_choice = "required"
mode = "build"
permission_mode = "allow"
max_output_tokens = 4096
max_session_cost_usd_micros = 10000
instructions = "Use the shell tool exactly once to grep the repo, then summarise the result in at most 4 lines."

[[steps]]
kind = "prompt"
text = "Use the shell tool to grep the repo for `pub fn render_status_detail_line` then summarise where the status-line renderer lives. Use the shell tool exactly once."
wait_for = "turn_completed"

[expect]
max_wall_clock_seconds = 300
max_input_tokens = 200000
max_tools_per_turn = 8
no_tool_errors = false

[triage]
enabled = false
