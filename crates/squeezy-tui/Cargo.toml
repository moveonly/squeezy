# Unix-only: re-raising SIGTSTP with the default disposition so Ctrl+Z (job
# control) actually suspends squeezy after we restore the terminal. Every `libc`
# use site lives in `#[cfg(unix)]` items in `signal_teardown.rs`, so the
# dependency is scoped to Unix targets and never compiled into Windows builds.
[target.'cfg(unix)'.dependencies]
libc.workspace = true

[dev-dependencies]
futures-util.workspace = true
