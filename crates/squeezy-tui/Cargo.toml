[package]
name = "squeezy-tui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true

[features]
# Off by default. Exposes `pub mod testing` with a `TuiHarness` that
# drives the full TuiApp + Agent + ratatui pipeline against a
# `TestBackend`. Consumed by `squeezy-eval` so scenarios can send key
# events at a real `handle_key`. Release TUI binaries don't enable it,
# so the test surface stays out of the shipped library.
testing = []
# Heavy terminal-emulator matrix (the `termsim` module). Implies
# `testing` because the scenario driver reuses `TuiHarness`. Off by
# default, so the release library and the default
# `cargo test -p squeezy-tui` never compile vt100/alacritty/insta nor
# the `termsim` tree. Only `--features term-matrix` pulls them in.
term-matrix = ["testing", "dep:vt100", "dep:alacritty_terminal", "dep:insta", "dep:futures-util"]

