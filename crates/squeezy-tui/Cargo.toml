# Optional, gated behind the `term-matrix` feature. See `[features]`.
vt100 = { workspace = true, optional = true }
alacritty_terminal = { workspace = true, optional = true }
insta = { workspace = true, optional = true }
# Needed by the `termsim` scenario driver's stub `LlmProvider` (an empty
# stream). Also a dev-dependency for the crate's other tests; the optional
# entry makes it available in the non-test lib build under `term-matrix`.
futures-util = { workspace = true, optional = true }

[dev-dependencies]
futures-util.workspace = true
