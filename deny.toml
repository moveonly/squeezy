[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-musl",
]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
    { allow = ["Zlib"], crate = "foldhash" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
allow = []
# Keep `indexmap` < 2.14 until `ratatui-core` upgrades off `hashbrown` 0.16.
# `indexmap` 2.14 bumped its `hashbrown` dep to 0.17, which would coexist
# with the 0.16 still pinned by the `ratatui` 0.30 stack and break the
# `multiple-versions = "deny"` rule above. Revisit when `ratatui-core` moves
# to `hashbrown` 0.17 (or any later compatible version).
deny = [
    { crate = "indexmap:>=2.14", reason = "Pulls in hashbrown 0.17 which duplicates the 0.16 pinned by ratatui-core; remove when ratatui-core upgrades hashbrown." },
]
skip = [
    # rmcp 1.7 requires reqwest 0.13 for its Streamable HTTP transport;
    # the rest of the workspace pins reqwest 0.12. The two versions coexist
    # cleanly (no symbol conflicts, separate feature sets). Revisit when
    # either rmcp downgrades its reqwest dep or we upgrade the workspace.
    { crate = "reqwest:0.13.3", reason = "rmcp 1.7 streamable-http transport requires reqwest 0.13; workspace on 0.12" },
    # The AWS SDK (aws-sigv4 / aws-smithy-eventstream) ships internally on a
    # newer `digest 0.11` / `sha2 0.11` stack while the rest of the workspace
    # (and `keyring` 3.6 via `secret-service`) still uses `digest 0.10`. The
    # two coexist without symbol conflicts. Revisit when AWS or our other
    # dependents converge on a single digest major.
    { crate = "block-buffer:0.10.4", reason = "aws-sigv4/sha2 0.11 vs digest 0.10 ecosystem (keyring, sha1)" },
    { crate = "cpufeatures:0.2.17", reason = "aws-sigv4/sha2 0.11 pulls cpufeatures 0.3 while sha1 0.10 stays on 0.2" },
    { crate = "crypto-common:0.1.6", reason = "aws-sigv4/sha2 0.11 ships crypto-common 0.2 alongside the workspace's 0.1" },
    { crate = "digest:0.10.7", reason = "aws-sigv4 depends on digest 0.11; keyring's sha1 stays on 0.10" },
    # `aws-smithy-eventstream` reuses the original `http 0.2` types in its
    # public API; the rest of the AWS SDK + the workspace are on `http 1.x`.
    # Both coexist; AWS upstream is tracking the migration.
    { crate = "http:0.2.12", reason = "aws-smithy-eventstream still exposes http 0.2 alongside the http 1.x stack" },
    { crate = "http-body:0.4.6", reason = "aws-smithy-eventstream still uses http-body 0.4 alongside http-body 1.x" },
    # `keyring 3.6` (via `zbus 4`) and `rmcp 1.7` (via `process-wrap`) pull
    # different `nix` majors. Both are platform-conditional and isolated.
    { crate = "nix:0.29.0", reason = "keyring 3.6 / zbus 4 on Linux still pin nix 0.29; rmcp's process-wrap is on 0.31" },
    # `secret-service`'s `crypto-rust` runtime depends on `hmac 0.12` /
    # `sha2 0.10`; aws-sigv4 pulls `hmac 0.13` / `sha2 0.11`. Both stacks
    # are platform-conditional or used in disjoint code paths.
    { crate = "hmac:0.12.1", reason = "secret-service (Linux keyring) on hmac 0.12 vs aws-sigv4 on 0.13" },
    { crate = "sha2:0.10.9", reason = "secret-service (Linux keyring) on sha2 0.10 vs aws-sigv4 on 0.11" },
    # Windows MSVC target pulls `aws-lc-sys` (via rustls), whose build
    # script depends on `cc 1.2 -> jobserver -> getrandom 0.3`, while
    # `rand_core 0.6` (via `secret-service`/`keyring` and `ring`) stays on
    # `getrandom 0.2`. Both coexist; aws-lc-sys upstream is migrating.
    { crate = "getrandom:0.2.17", reason = "aws-lc-sys cc/jobserver build deps pull getrandom 0.3 on Windows; rand_core 0.6 stays on 0.2" },
    # Several Windows-touching crates (tokio, crossterm, dirs-sys, mio,
    # parking_lot, rustls-platform-verifier, …) and the direct windows-sys
    # used by squeezy-tools' Job Object backend sit on different
    # `windows-sys` / `windows-targets` majors. They are platform-conditional
    # and isolated; the rest of the workspace targets do not link multiple
    # copies.
    { crate = "windows-sys:0.52.0", reason = "transitive Windows shims pin windows-sys 0.52 alongside the 0.59/0.60/0.61 used elsewhere" },
    { crate = "windows-sys:0.59.0", reason = "squeezy-tools win_job uses windows-sys 0.59; other transitive crates pin 0.52/0.60/0.61" },
    { crate = "windows-sys:0.60.2", reason = "transitive Windows shims pin windows-sys 0.60 alongside 0.52/0.59/0.61" },
    { crate = "windows-sys:0.61.2", reason = "transitive Windows shims pin windows-sys 0.61 alongside 0.52/0.59/0.60" },
    { crate = "windows-targets:0.52.6", reason = "windows-sys 0.52/0.59 → windows-targets 0.52 vs windows-sys 0.60+ → windows-targets 0.53" },
    { crate = "windows-targets:0.53.5", reason = "newer windows-sys split — coexists with 0.52" },
    { crate = "windows_x86_64_msvc:0.52.6", reason = "follows windows-targets 0.52 split" },
    { crate = "windows_x86_64_msvc:0.53.1", reason = "follows windows-targets 0.53 split" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
