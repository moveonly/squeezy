[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-musl",
]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
    { allow = ["Zlib"], crate = "foldhash" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
allow = []
# Keep `indexmap` < 2.14 until `ratatui-core` upgrades off `hashbrown` 0.16.
# `indexmap` 2.14 bumped its `hashbrown` dep to 0.17, which would coexist
# with the 0.16 still pinned by the `ratatui` 0.30 stack and break the
# `multiple-versions = "deny"` rule above. Revisit when `ratatui-core` moves
# to `hashbrown` 0.17 (or any later compatible version).
deny = [
    { crate = "indexmap:>=2.14", reason = "Pulls in hashbrown 0.17 which duplicates the 0.16 pinned by ratatui-core; remove when ratatui-core upgrades hashbrown." },
]
skip = [
    # rmcp 1.7 requires reqwest 0.13 for its Streamable HTTP transport;
    # the rest of the workspace pins reqwest 0.12. The two versions coexist
    # cleanly (no symbol conflicts, separate feature sets). Revisit when
    # either rmcp downgrades its reqwest dep or we upgrade the workspace.
    { crate = "reqwest:0.13.3", reason = "rmcp 1.7 streamable-http transport requires reqwest 0.13; workspace on 0.12" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
